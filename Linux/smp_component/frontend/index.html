<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    @import url('https://fonts.googleapis.com/css2?family=Iosevka+Charon+Mono:ital,wght@0,300;0,400;0,500;1,400&display=swap');
    body { background: #0e0e0e; overflow: hidden; font-family: 'Iosevka Charon Mono', monospace; color: #f0f0f0; }
  body.cm-light { background: #f5f0e8; color: #1a1a1a; }
  body.cm-light .modebar-btn svg,
  body.cm-light svg [fill="#DFFF00"],
  body.cm-light svg [stroke="#DFFF00"] { color: #2f5d16 !important; fill: #2f5d16 !important; stroke: #2f5d16 !important; }
    #plot { width: 100%; }
    .cm-chart-wrap { position: relative; width: 100%; }
    .cm-export-controls {
      position: absolute;
      top: 8px;
      right: 8px;
      z-index: 20;
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .cm-export-controls button {
      border: 1px solid rgba(142,255,113,0.28);
      background: rgba(7,16,8,0.78);
      color: #dfff00;
      height: 28px;
      padding: 0 9px;
      border-radius: 5px;
      font: 700 10px 'Iosevka Charon Mono', monospace;
      cursor: pointer;
    }
    .cm-export-controls button:hover { border-color: rgba(142,255,113,0.72); }
    .cm-export-controls select {
      border: 1px solid rgba(142,255,113,0.22);
      background: rgba(7,16,8,0.72);
      color: #f4f7f2;
      height: 28px;
      padding: 0 7px;
      border-radius: 5px;
      font: 700 10px 'Iosevka Charon Mono', monospace;
      cursor: pointer;
      outline: none;
    }
    body.cm-light .cm-export-controls button {
      background: rgba(248,246,240,0.88);
      color: #2f5d16;
      border-color: rgba(47,93,22,0.28);
    }
    body.cm-light .cm-export-controls select {
      background: rgba(248,246,240,0.88);
      color: #1f3214;
      border-color: rgba(47,93,22,0.24);
    }
    .cm-network-controls {
      position: absolute;
      bottom: 8px;
      left: 8px;
      z-index: 19;
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      max-width: calc(100% - 220px);
      padding: 5px;
      border-radius: 6px;
      background: rgba(7,16,8,0.54);
      box-shadow: 0 0 0 1px rgba(142,255,113,0.08);
    }
    .cm-network-controls select {
      border: 1px solid rgba(142,255,113,0.22);
      background: rgba(7,16,8,0.72);
      color: #f4f7f2;
      height: 28px;
      padding: 0 7px;
      border-radius: 5px;
      font: 700 10px 'Iosevka Charon Mono', monospace;
      cursor: pointer;
      outline: none;
    }
    body.cm-light .cm-network-controls select {
      background: rgba(248,246,240,0.88);
      color: #1f3214;
      border-color: rgba(47,93,22,0.24);
    }
    body.cm-light .cm-network-controls {
      background: rgba(248,246,240,0.62);
      box-shadow: 0 0 0 1px rgba(47,93,22,0.10);
    }
    #no-data {
      display: none;
      text-align: center;
      padding: 40px 20px;
      color: #888;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="plot"></div>
  <div id="no-data">No data available.</div>

  <script src="echarts.min.js"></script>
  <script src="gif.js"></script>
  <script>
  if (typeof echarts === "undefined") {
    var _s = document.createElement("script");
    _s.src = "https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js";
    document.head.appendChild(_s);
  }
  if (typeof GIF === "undefined") {
    var _g = document.createElement("script");
    _g.src = "https://cdn.jsdelivr.net/npm/gif.js.optimized/dist/gif.js";
    document.head.appendChild(_g);
  }
  </script>
  <script>
  // ════════════════════════════════════════════════════════════════════════════
  // Streamlit component protocol (unchanged from working version)
  // ════════════════════════════════════════════════════════════════════════════
  const Streamlit = {
    ready() {
      window.parent.postMessage(
        { isStreamlitMessage: true, type: "streamlit:componentReady", apiVersion: 1 }, "*"
      );
    },
    setHeight(h) {
      window.parent.postMessage(
        { isStreamlitMessage: true, type: "streamlit:setFrameHeight", height: Math.ceil(h) }, "*"
      );
    },
    setValue(v) {
      window.parent.postMessage(
        { isStreamlitMessage: true, type: "streamlit:setComponentValue", value: v, dataType: "json" }, "*"
      );
    }
  };

  // ════════════════════════════════════════════════════════════════════════════
  // Constants (dark mode defaults; lights override per render)
  // ════════════════════════════════════════════════════════════════════════════
  const HOME_RGB   = [0, 175, 254];
  const AWAY_RGB   = [255, 112, 118];
  const HOME_HEX   = "#00affe";
  const AWAY_HEX   = "#ff7076";
  const SUCC_HEX   = "#00affe";
  const FAIL_HEX   = "#ff7076";
  const HUD_GREEN  = "#8eff71";
  const PITCH_BG   = "#071008";
  const PITCH_LINE = "rgba(142,255,113,0.32)";
  const PITCH_THICK= "rgba(142,255,113,0.62)";
  const LIGHT_PITCH_BG   = "#d7edca";
  const LIGHT_PITCH_LINE = "rgba(25,61,9,0.62)";
  const LIGHT_PITCH_THICK= "rgba(25,61,9,0.88)";
  const LIGHT_HUD_GREEN  = "#2d5a0e";
  const LIGHT_GOAL_FILL     = "rgba(0,0,0,0.04)";
  const LIGHT_GOALFRAME_FILL= "rgba(0,0,0,0.08)";
  const LIGHT_GOAL_LINE     = "#555555";
  const LIGHT_LEGEND_FONT   = "#1a1a1a";
  const LIGHT_MARKER_BORDER = "rgba(16,32,10,0.72)";
  const LIGHT_ANNO_COLOR    = "#2c351f";
  const LIGHT_PASS_LABEL    = "#1a1a1a";
  const LIGHT_CARRY_LINE    = "rgba(132,94,0,0.72)";
  const LIGHT_DRIBBLE_LINE  = "rgba(21,100,54,0.62)";
  const LIGHT_PENALTY       = "rgba(0,0,0,0.35)";
  const LIGHT_SHADOW        = "rgba(0,0,0,0.30)";
  const MISSED     = new Set(["MissedShot","Attempt","MissedShots"]);
  // Real football pitch aspect: 105m length x 68m width.
  const HORIZONTAL_PITCH_SCALERATIO = 68 / 105;
  const VERTICAL_PITCH_SCALERATIO = 105 / 68;
  const DARK_MARKER_BORDER = "rgba(255,255,255,0.78)";

  // Standard football goal dimensions: 7.32m wide x 2.44m high.
  // The feed uses a much taller z-scale than the goal-mouth y-span,
  // so we preserve the real-world goal ratio through axis scaling.
  const GOAL_Y_LEFT  = 45.2;  // Matches existing width
  const GOAL_Y_RIGHT = 54.8;
  const GOAL_Z_TOP   = 29.5;
  const GOAL_Z_BOT   = 0;
  const GOAL_ASPECT_RATIO = 7.32 / 2.44;
  const GOAL_SCALERATIO = (GOAL_Y_RIGHT - GOAL_Y_LEFT) / (GOAL_ASPECT_RATIO * (GOAL_Z_TOP - GOAL_Z_BOT));
  const NORMAL_GOALFRAME_X_RANGE = [20, 80];
  const NORMAL_GOALFRAME_Y_RANGE = [-8, GOAL_Z_TOP + 14];
  const NORMAL_GOALFRAME_EXPAND_MARGIN_X = 4;
  const NORMAL_GOALFRAME_EXPAND_MARGIN_Y = 8;
  const SHOOTOUT_GOALFRAME_X_PADDING = 7.5;
  const SHOOTOUT_GOALFRAME_X_RANGE = [GOAL_Y_LEFT - SHOOTOUT_GOALFRAME_X_PADDING, GOAL_Y_RIGHT + SHOOTOUT_GOALFRAME_X_PADDING];
  const SHOOTOUT_GOALFRAME_Y_RANGE = [-8, GOAL_Z_TOP + 14];
  const SHOOTOUT_GOALFRAME_EXPAND_MARGIN_X = 4;
  const SHOOTOUT_GOALFRAME_EXPAND_MARGIN_Y = 8;

  const DEF_STYLE = {
    "Tackle":       { color:"#2980b9", symbol:"circle" },
    "Interception": { color:"#27ae60", symbol:"square" },
    "Clearance":    { color:"#95a5a6", symbol:"diamond" },
    "Aerial":       { color:"#8e44ad", symbol:"triangle-up" },
    "Block":        { color:"#d35400", symbol:"pentagon" },
    "Challenge":    { color:"#1abc9c", symbol:"hexagon" },
    "Dispossessed": { color:"#c0392b", symbol:"x" },
  };

  // ════════════════════════════════════════════════════════════════════════════
  // Colour helpers
  // ════════════════════════════════════════════════════════════════════════════
  function shotColor(isHome) {
    const [r, g, b] = isHome ? HOME_RGB : AWAY_RGB;
    return `rgba(${r},${g},${b},0.92)`;
  }
  function borderColor(isHome) {
    const [r, g, b] = isHome ? HOME_RGB : AWAY_RGB;
    return `rgba(${r},${g},${b},0.90)`;
  }
  function hexToRgba(hex, alpha) {
    const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${alpha})`;
  }
  function lightModeAccent(hex) {
    const map = {
      "#00affe": "#0078ad",
      "#ff7076": "#b9353d",
      "#e0c860": "#a87800",
      "#27ae60": "#16733e",
      "#e74c3c": "#b82f24",
      "#7ab4ff": "#1f69b3",
      "#2980b9": "#17608f",
      "#95a5a6": "#566667",
      "#8e44ad": "#6b2d86",
      "#d35400": "#974000",
      "#1abc9c": "#087864",
      "#c0392b": "#92251c",
    };
    return map[String(hex || "").toLowerCase()] || hex;
  }
  function rgbaFromHex(hex, alpha, isLight) {
    return hexToRgba(isLight ? lightModeAccent(hex) : hex, alpha);
  }
  function attackDirectionAnnotation(hudColor) {
    const _hud = hudColor || HUD_GREEN;
    const _isLight = _hud === LIGHT_HUD_GREEN;
    return {
      text: "ATTACK ->",
      x: 0.94, y: 0.94, xref: "paper", yref: "paper",
      xanchor: "right", yanchor: "bottom", showarrow: false,
      font: { size: 11, color: _hud, family: "Iosevka Charon Mono, monospace" },
      bgcolor: _isLight ? "rgba(245,240,232,0.72)" : "rgba(11,14,20,0.72)",
      bordercolor: _isLight ? "rgba(47,93,22,0.22)" : "rgba(142,255,113,0.28)",
      borderwidth: 1, borderpad: 4,
    };
  }

  function horizontalPitchShapes(pl, pt, pb, gf, gridColor, zoneFill, zoneLine) {
    const shapes = pitchShapes(pl, pt, pb, gf);
    const _grid = gridColor || "rgba(142,255,113,0.045)";
    const _zoneFill = zoneFill || "rgba(142,255,113,0.035)";
    const _zoneLine = zoneLine || "rgba(142,255,113,0.10)";
    for (let x = 10; x < 100; x += 10) {
      shapes.push({ type:"line", x0:x, y0:0, x1:x, y1:100, line:{color:_grid, width:1}, layer:"below" });
    }
    for (let y = 10; y < 100; y += 10) {
      shapes.push({ type:"line", x0:0, y0:y, x1:100, y1:y, line:{color:_grid, width:1}, layer:"below" });
    }
    shapes.push({ type:"rect", x0:66, y0:0, x1:100, y1:100, fillcolor:_zoneFill, line:{color:_zoneLine, width:1}, layer:"below" });
    return shapes;
  }

  // ════════════════════════════════════════════════════════════════════════════
  // Pitch shapes (from working Shot Map Parlour — proven correct)
  // ════════════════════════════════════════════════════════════════════════════
  function pitchShapes(pl, pt, pb, gf) {
    const _pl = pl || PITCH_LINE;
    const _pt = pt || PITCH_THICK;
    const _pb = pb || PITCH_BG;
    const lw  = { color: _pl,  width: 1.5 };
    const lw2 = { color: _pt, width: 1.5 };
    const t   = "rgba(0,0,0,0)";
    const wh  = gf || "rgba(255,255,255,0.04)";
    return [
      { type:"rect",   x0:-3,    y0:0,    x1:103,   y1:100,  fillcolor:_pb, line:lw2, layer:"below" },
      { type:"rect",   x0:0,     y0:0,    x1:100,   y1:100,  fillcolor:t,        line:lw2 },
      { type:"line",   x0:50,    y0:0,    x1:50,    y1:100,  line:lw },
      { type:"circle", x0:40.85, y0:35.9, x1:59.15, y1:64.1, fillcolor:t,        line:lw },
      { type:"circle", x0:49.5,  y0:49.3, x1:50.5,  y1:50.7, fillcolor:_pl, line:lw },
      { type:"rect",   x0:0,     y0:21.1, x1:17.0,  y1:78.9, fillcolor:t,        line:lw },
      { type:"rect",   x0:83.0,  y0:21.1, x1:100,   y1:78.9, fillcolor:t,        line:lw },
      { type:"rect",   x0:0,     y0:36.6, x1:5.5,   y1:63.4, fillcolor:t,        line:lw },
      { type:"rect",   x0:94.5,  y0:36.6, x1:100,   y1:63.4, fillcolor:t,        line:lw },
      { type:"circle", x0:10.5,  y0:49.3, x1:11.5,  y1:50.7, fillcolor:_pl, line:lw },
      { type:"circle", x0:88.5,  y0:49.3, x1:89.5,  y1:50.7, fillcolor:_pl, line:lw },
      { type:"rect",   x0:-3,    y0:44.5, x1:0,     y1:55.5, fillcolor:wh, line:{color:_pt, width:2} },
      { type:"rect",   x0:100,   y0:44.5, x1:103,   y1:55.5, fillcolor:wh, line:{color:_pt, width:2} },
    ];
  }

  function halfPitchVertShapes(pl, pt, pb, gf) {
    const _pl = pl || PITCH_LINE;
    const _pt = pt || PITCH_THICK;
    const _pb = pb || PITCH_BG;
    const lw  = { color: _pl,  width: 1.5 };
    const lw2 = { color: _pt, width: 1.5 };
    const t   = "rgba(0,0,0,0)";
    const wh  = gf || "rgba(255,255,255,0.04)";
    return [
      { type:"rect",   x0:0,    y0:-3,   x1:100,  y1:53,   fillcolor:_pb, line:lw2, layer:"below" },
      { type:"rect",   x0:0,    y0:0,    x1:100,  y1:50,   fillcolor:t,        line:lw2 },
      { type:"line",   x0:0,    y0:50,   x1:100,  y1:50,   line:lw },
      { type:"rect",   x0:21.1, y0:0,    x1:78.9, y1:17.0, fillcolor:t,        line:lw },
      { type:"rect",   x0:36.6, y0:0,    x1:63.4, y1:5.5,  fillcolor:t,        line:lw },
      { type:"circle", x0:49.3, y0:10.5, x1:50.7, y1:11.5, fillcolor:_pl, line:lw },
      { type:"rect",   x0:44.5, y0:-3,   x1:55.5, y1:0,    fillcolor:wh, line:{color:_pt, width:2} },
    ];
  }


  // Defensive half pitch: own goal at bottom (y=100), centre line at top (y=50)
  // Used for goalkeeper maps — mirrors halfPitchVertShapes but shows own half
  function defHalfPitchVertShapes(pl, pt, pb, gf) {
    const _pl = pl || PITCH_LINE;
    const _pt = pt || PITCH_THICK;
    const _pb = pb || PITCH_BG;
    const lw  = { color: _pl,  width: 1.5 };
    const lw2 = { color: _pt, width: 1.5 };
    const t   = "rgba(0,0,0,0)";
    const wh  = gf || "rgba(255,255,255,0.04)";
    return [
      { type:"rect",   x0:0,    y0:47,   x1:100,  y1:103,  fillcolor:_pb, line:lw2, layer:"below" },
      { type:"rect",   x0:0,    y0:50,   x1:100,  y1:100,  fillcolor:t,        line:lw2 },
      { type:"line",   x0:0,    y0:50,   x1:100,  y1:50,   line:lw },
      { type:"rect",   x0:21.1, y0:83.0, x1:78.9, y1:100,  fillcolor:t,        line:lw },
      { type:"rect",   x0:36.6, y0:94.5, x1:63.4, y1:100,  fillcolor:t,        line:lw },
      { type:"circle", x0:49.3, y0:88.5, x1:50.7, y1:89.5, fillcolor:_pl, line:lw },
      { type:"rect",   x0:44.5, y0:100,  x1:55.5, y1:103,  fillcolor:wh, line:{color:_pt, width:2} },
      { type:"path",   path:"M 35.9 83.0 A 14.1 9.15 0 0 1 64.1 83.0", fillcolor:t, line:lw },
    ];
  }

  // Full pitch drawn vertically: x=0-100 (width), y=0-100 (length)
  // Goal at y=0 (top), own goal at y=100 (bottom), direction of play: bottom→top
  function fullPitchVertShapes(pl, pt, pb, gf) {
    const _pl = pl || PITCH_LINE;
    const _pt = pt || PITCH_THICK;
    const _pb = pb || PITCH_BG;
    const lw  = { color: _pl,  width: 1.5 };
    const lw2 = { color: _pt, width: 1.5 };
    const t   = "rgba(0,0,0,0)";
    const wh  = gf || "rgba(255,255,255,0.04)";
    return [
      // Background
      { type:"rect", x0:-3, y0:-3, x1:103, y1:103, fillcolor:_pb, line:lw2, layer:"below" },
      // Pitch outline
      { type:"rect", x0:0, y0:0, x1:100, y1:100, fillcolor:t, line:lw2 },
      // Centre line
      { type:"line", x0:0, y0:50, x1:100, y1:50, line:lw },
      // Centre circle
      { type:"circle", x0:35.9, y0:40.85, x1:64.1, y1:59.15, fillcolor:t, line:lw },
      // Centre spot
      { type:"circle", x0:49.3, y0:49.5, x1:50.7, y1:50.5, fillcolor:_pl, line:lw },
      // Top penalty area (attacking end)
      { type:"rect", x0:21.1, y0:0, x1:78.9, y1:17.0, fillcolor:t, line:lw },
      // Top 6-yard box
      { type:"rect", x0:36.6, y0:0, x1:63.4, y1:5.5, fillcolor:t, line:lw },
      // Top penalty spot
      { type:"circle", x0:49.3, y0:10.5, x1:50.7, y1:11.5, fillcolor:_pl, line:lw },
      // Top goal
      { type:"rect", x0:44.5, y0:-3, x1:55.5, y1:0, fillcolor:wh, line:{color:_pt, width:2} },
      // Bottom penalty area (own goal end)
      { type:"rect", x0:21.1, y0:83.0, x1:78.9, y1:100, fillcolor:t, line:lw },
      // Bottom 6-yard box
      { type:"rect", x0:36.6, y0:94.5, x1:63.4, y1:100, fillcolor:t, line:lw },
      // Bottom penalty spot
      { type:"circle", x0:49.3, y0:88.5, x1:50.7, y1:89.5, fillcolor:_pl, line:lw },
      // Bottom goal
      { type:"rect", x0:44.5, y0:100, x1:55.5, y1:103, fillcolor:wh, line:{color:_pt, width:2} },
      // Penalty arcs (top)
      { type:"path", path:"M 35.9 17.0 A 14.1 9.15 0 0 0 64.1 17.0", fillcolor:t, line:lw },
      // Penalty arcs (bottom)
      { type:"path", path:"M 35.9 83.0 A 14.1 9.15 0 0 1 64.1 83.0", fillcolor:t, line:lw },
    ];
  }

  function goalframeShapes(xRange, yRange, glColor, gfFill, bgColor, gridColor) {
    const goalLine = { color: glColor || "#ffffff", width: 3 };
    const t = "rgba(0,0,0,0)";
    const _bg = bgColor || PITCH_BG;
    const _grid = gridColor || PITCH_LINE;
    // Goal dimensions: width (GOAL_Y_RIGHT - GOAL_Y_LEFT) = 9.6 units
    // Height (GOAL_Z_TOP = 33.3 z-units ≈ crossbar; goal is 3:1 w:h aspect ratio)
    // To ensure correct aspect ratio, the plot limits and scaling need to reflect this.
    return [
      // Background rectangle for the goalframe area. Adjusted y1 to match new GOAL_Z_TOP.
      { type:"rect", x0:xRange[0], y0:yRange[0], x1:xRange[1], y1:yRange[1], fillcolor:_bg, line:{color:t}, layer:"below" },
      // Goal frame outline.
      { type:"rect", x0:GOAL_Y_LEFT, y0:GOAL_Z_BOT, x1:GOAL_Y_RIGHT, y1:GOAL_Z_TOP,
        fillcolor:gfFill || "rgba(255,255,255,0.08)", line:goalLine },
      // Ground line at the goal.
      { type:"line", x0:xRange[0], y0:0, x1:xRange[1], y1:0, line:{color:_grid, width:1} },
      // Vertical grid lines inside the goal, adjusted to new GOAL_Z_TOP.
      { type:"line", x0:GOAL_Y_LEFT + (GOAL_Y_RIGHT-GOAL_Y_LEFT)/3, y0:GOAL_Z_BOT,
        x1:GOAL_Y_LEFT + (GOAL_Y_RIGHT-GOAL_Y_LEFT)/3, y1:GOAL_Z_TOP,
        line:{color:_grid, width:0.8, dash:"dot"} },
      { type:"line", x0:GOAL_Y_LEFT + 2*(GOAL_Y_RIGHT-GOAL_Y_LEFT)/3, y0:GOAL_Z_BOT,
        x1:GOAL_Y_LEFT + 2*(GOAL_Y_RIGHT-GOAL_Y_LEFT)/3, y1:GOAL_Z_TOP,
        line:{color:_grid, width:0.8, dash:"dot"} },
      // Horizontal grid line inside the goal, adjusted to new GOAL_Z_TOP.
      { type:"line", x0:GOAL_Y_LEFT, y0:GOAL_Z_TOP/2,
        x1:GOAL_Y_RIGHT, y1:GOAL_Z_TOP/2,
        line:{color:_grid, width:0.8, dash:"dot"} },
      // Goalposts extending slightly below the ground line.
      { type:"line", x0:GOAL_Y_LEFT,  y0:0, x1:GOAL_Y_LEFT,  y1:-4, line:goalLine },
      { type:"line", x0:GOAL_Y_RIGHT, y0:0, x1:GOAL_Y_RIGHT, y1:-4, line:goalLine },
    ];
  }

  function expandedGoalframeRangeForShot(shot, defaultXRange, defaultYRange, marginX, marginY) {
    if (!shot || shot._px == null || shot._py == null) {
      return { xRange: defaultXRange, yRange: defaultYRange };
    }

    const xRange = [...defaultXRange];
    const yRange = [...defaultYRange];

    if (shot._px < xRange[0]) xRange[0] = shot._px - marginX;
    if (shot._px > xRange[1]) xRange[1] = shot._px + marginX;
    if (shot._py < yRange[0]) yRange[0] = shot._py - marginY;

    return [];
  }

  function parseDash(dash) {
    return dash === "dot" ? "dotted" : dash === "dash" ? "dashed" : "solid";
  }

  function shapeSeries(shapes, axisCount) {
    const byAxis = Array.from({ length: axisCount }, () => []);
    (shapes || []).forEach((shape) => {
      const idx = axisIndexFromRef(shape.xref || shape.yref);
      if (shape.xref === "paper" || shape.yref === "paper") return;
      byAxis[idx].push(shape);
    });
    return byAxis.map((items, axisIndex) => ({
      type: "custom",
      xAxisIndex: axisIndex,
      yAxisIndex: axisIndex,
      data: items.map((shape, i) => [i]),
      silent: true,
      legendHoverLink: false,
      z: 0,
      renderItem(params, api) {
        const shape = items[api.value(0)];
        const coord = (x, y) => api.coord([Number(x), Number(y)]);
        const style = {
          fill: shape.fillcolor || "rgba(0,0,0,0)",
          stroke: shape.line && shape.line.color || "rgba(255,255,255,0.4)",
          lineWidth: Number(shape.line && shape.line.width) || 1,
          lineDash: shape.line && shape.line.dash === "dot" ? [2, 3] : null,
        };
        if (shape.type === "line") {
          const p0 = coord(shape.x0, shape.y0);
          const p1 = coord(shape.x1, shape.y1);
          return { type: "line", shape: { x1: p0[0], y1: p0[1], x2: p1[0], y2: p1[1] }, style };
        }
        if (shape.type === "circle") {
          const p0 = coord(shape.x0, shape.y0);
          const p1 = coord(shape.x1, shape.y1);
          return {
            type: "ellipse",
            shape: { cx: (p0[0] + p1[0]) / 2, cy: (p0[1] + p1[1]) / 2, rx: Math.abs(p1[0] - p0[0]) / 2, ry: Math.abs(p1[1] - p0[1]) / 2 },
            style,
          };
        }
        if (shape.type === "path") {
          const m = String(shape.path || "").match(/M\s*([-\d.]+)\s+([-\d.]+)\s+A\s*([-\d.]+)\s+([-\d.]+)\s+0\s+0\s+([01])\s+([-\d.]+)\s+([-\d.]+)/i);
          if (m) {
            const x0 = Number(m[1]), y0 = Number(m[2]), rx = Math.abs(Number(m[3])), ry = Math.abs(Number(m[4]));
            const sweep = Number(m[5]), x1 = Number(m[6]), y1 = Number(m[7]);
            const cx = (x0 + x1) / 2;
            const cy = y0;
            const points = [];
            for (let step = 0; step <= 28; step++) {
              const t = step / 28;
              const angle = sweep ? Math.PI * (1 - t) : Math.PI * t;
              const x = cx + Math.cos(angle) * rx;
              const y = cy + (sweep ? -1 : 1) * Math.sin(angle) * ry;
              points.push(coord(x, y));
            }
            return { type: "polyline", shape: { points }, style };
          }
        }
        const p0 = coord(shape.x0, shape.y0);
        const p1 = coord(shape.x1, shape.y1);
        return {
          type: "rect",
          shape: { x: Math.min(p0[0], p1[0]), y: Math.min(p0[1], p1[1]), width: Math.abs(p1[0] - p0[0]), height: Math.abs(p1[1] - p0[1]) },
          style,
        };
      },
    })).filter(series => series.data.length);
  }

  function annotationSeries(annotations, axisCount, layout) {
    const series = [];
    const graphic = [];
    (annotations || []).forEach((ann, i) => {
      if (ann.showarrow && ann.xref && ann.yref && ann.xref !== "paper" && ann.yref !== "paper") {
        const idx = axisIndexFromRef(ann.xref);
        series.push({
          type: "lines",
          xAxisIndex: idx,
          yAxisIndex: idx,
          coordinateSystem: "cartesian2d",
          data: [{ coords: [[ann.ax, ann.ay], [ann.x, ann.y]] }],
          lineStyle: { color: ann.arrowcolor || "#dfff00", width: Number(ann.arrowwidth) || 2, opacity: 0.92 },
          symbol: ["none", "arrow"],
          symbolSize: Number(ann.arrowsize || 1) * 9,
          silent: true,
          z: 12,
        });
      } else if (ann.xref === "paper" || ann.yref === "paper") {
        const x = Number(ann.x || 0);
        const y = Number(ann.y || 0);
        const xanchor = ann.xanchor || ann.align || "left";
        const yanchor = ann.yanchor || "top";
        const item = {
          type: "text",
          style: {
            text: stripHtml(ann.text || ""),
            fill: ann.font && ann.font.color || layout.font && layout.font.color || "#f4f7f2",
            font: `${ann.font && ann.font.size || 10}px Iosevka Charon Mono, monospace`,
            align: xanchor === "right" ? "right" : xanchor === "center" ? "center" : "left",
            verticalAlign: yanchor === "bottom" ? "bottom" : yanchor === "middle" ? "middle" : "top",
          },
          silent: true,
          z: 30,
        };
        if (xanchor === "right") item.right = `${Math.max(0, (1 - x) * 100)}%`;
        else item.left = `${Math.max(0, x * 100)}%`;
        if (yanchor === "bottom") item.bottom = `${Math.max(0, y * 100)}%`;
        else item.top = `${Math.max(0, (1 - y) * 100)}%`;
        graphic.push(item);
      } else if (ann.x != null && ann.y != null) {
        const idx = axisIndexFromRef(ann.xref);
        series.push({
          type: "scatter",
          xAxisIndex: idx,
          yAxisIndex: idx,
          data: [[ann.x, ann.y]],
          symbolSize: 1,
          itemStyle: { opacity: 0 },
          label: {
            show: true,
            formatter: stripHtml(ann.text || ""),
            color: ann.font && ann.font.color || layout.font && layout.font.color || "#f4f7f2",
            fontSize: ann.font && ann.font.size || 10,
            position: "inside",
          },
          silent: true,
          z: 25,
        });
      }
    });
    return { series, graphic };
  }

  function echartsOptionFromPlotly(traces, layout, args, opts) {
    const revealFraction = opts && opts.revealFraction;
    const chartSize = opts && opts.chartSize;
    const exporting = opts && opts.exporting;
    const branded = withExportBrand(layout, args);
    const axisCount = collectAxisCount(branded, traces);
    const grids = [];
    const xAxes = [];
    const yAxes = [];
    for (let i = 0; i < axisCount; i++) {
      const xKey = i === 0 ? "xaxis" : `xaxis${i + 1}`;
      const yKey = i === 0 ? "yaxis" : `yaxis${i + 1}`;
      grids.push(gridFromAxes(branded, i, chartSize));
      xAxes.push(Object.assign(axisOption(branded[xKey], false, [-5, 105]), { gridIndex: i }));
      yAxes.push(Object.assign(axisOption(branded[yKey], true, [105, -5]), { gridIndex: i }));
    }
    const ctx = contextFromArgs(args || {});
    const optionOpts = Object.assign({}, opts || {}, { isLight: ctx.isLight });
    const sourceTraces = filterTracesForExport(traces, optionOpts);
    const converted = [];
    sourceTraces.forEach((trace) => converted.push(...convertTrace(trace, branded, revealFraction, optionOpts)));
    converted.unshift(...shapeSeries(branded.shapes || [], axisCount));
    const ann = annotationSeries(branded.annotations || [], axisCount, branded);
    converted.push(...ann.series);
    const title = branded.title && branded.title.text ? stripHtml(branded.title.text) : "";
    const legendData = legendDataFromTraces(sourceTraces);
    return {
      backgroundColor: branded.paper_bgcolor || branded.plot_bgcolor || (ctx.isLight ? "#f8f6f0" : "#071008"),
      animation: !exporting,
      animationDuration: exporting ? 0 : 450,
      animationEasing: "cubicOut",
      title: title ? {
        text: title.split("\n")[0] || "",
        subtext: title.split("\n").slice(1).join("  "),
        left: 14,
        top: 8,
        textStyle: { color: branded.font && branded.font.color || "#f4f7f2", fontSize: 16, fontFamily: "Iosevka Charon Mono, monospace", fontWeight: 800 },
        subtextStyle: { color: ctx.isLight ? "#302a22" : "#d8dee2", fontSize: 11, fontFamily: "Iosevka Charon Mono, monospace" },
      } : undefined,
      grid: grids,
      xAxis: xAxes,
      yAxis: yAxes,
      legend: branded.showlegend === false || !legendData.length ? { show: false } : {
        show: true,
        data: legendData,
        bottom: 8,
        left: "center",
        textStyle: { color: ctx.isLight ? LIGHT_LEGEND_FONT : "#cfd4d8", fontSize: 11 },
      },
      tooltip: {
        trigger: "item",
        confine: true,
        backgroundColor: ctx.isLight ? "rgba(255,255,255,0.96)" : "rgba(8,12,10,0.96)",
        borderColor: ctx.isLight ? "rgba(0,0,0,0.16)" : "rgba(142,255,113,0.22)",
        textStyle: { color: ctx.isLight ? "#111111" : "#f4f7f2" },
        formatter(params) {
          const data = params.data || {};
          return data.tooltipText || params.seriesName || "";
        },
      },
      graphic: ann.graphic,
      series: exporting ? converted.map((series) => Object.assign({}, series, {
        animation: false,
        animationDuration: 0,
        animationDurationUpdate: 0,
      })) : converted,
    };
  }

  function downloadDataUrl(url, filename) {
    const link = document.createElement("a");
    link.href = url;
    link.download = filename;
    link.click();
  }

  function exportAnimationKey(args) {
    const parts = [
      args && args.component_type,
      args && args.mode,
      args && args.view,
      args && args.entry_mode,
    ].filter(Boolean).map((part) => String(part).trim());
    return `clipmaker:gif-animation:${parts.join(":") || "chart"}`;
  }

  function animationOptionsForArgs(args) {
    const component = args && args.component_type;
    const simple = [
      ["build", "Build"],
      ["pulse", "Pulse"],
      ["still", "Still"],
    ];
    const flow = [
      ["build", "Build"],
      ["arrow", "Arrow Flow"],
      ["pulse", "Pulse"],
      ["still", "Still"],
    ];
    const sequence = [
      ["build", "Build"],
      ["sequence", "Sequence"],
      ["arrow", "Arrow Flow"],
      ["pulse", "Pulse"],
      ["still", "Still"],
    ];
    if (component === "pass_map" && args && args.mode === "network") {
      return [
        ["network", "Network Grow"],
        ["pulse", "Pulse"],
        ["still", "Still"],
      ];
    }
    if (component === "pass_map") return flow;
    if (component === "build_up_map") return sequence;
    if (component === "defensive_map") return simple;
    if (component === "dribble_carry_map") return simple;
    if (component === "goalkeeper_map") return simple;
    if (component === "shot_map") return simple;
    if (component === "penalty_shootout") return simple;
    if (component === "echarts_option") return simple;
    return simple;
  }

  function exportControlsHtml(defaultMode, args) {
    const options = animationOptionsForArgs(args || {});
    const fallbackMode = options.length ? options[0][0] : "build";
    const selectedMode = options.some(([value]) => value === defaultMode) ? defaultMode : fallbackMode;
    return [
      '<button type="button" data-export="png">PNG</button>',
      '<select data-export-animation title="GIF animation">',
      ...options.map(([value, label]) => `<option value="${value}"${selectedMode === value ? " selected" : ""}>${label}</option>`),
      '</select>',
      '<button type="button" data-export="gif">GIF</button>',
    ].join("");
  }

  function prepareExportControls(wrap, args) {
    let controls = wrap.querySelector(".cm-export-controls");
    if (!controls) {
      controls = document.createElement("div");
      controls.className = "cm-export-controls";
      wrap.appendChild(controls);
    }
    const key = exportAnimationKey(args || {});
    const options = animationOptionsForArgs(args || {});
    const saved = localStorage.getItem(key) || "build";
    const fallbackMode = options.length ? options[0][0] : "build";
    const mode = options.some(([value]) => value === saved) ? saved : fallbackMode;
    if (mode !== saved) localStorage.setItem(key, mode);
    controls.innerHTML = exportControlsHtml(mode, args || {});
    const selector = controls.querySelector("[data-export-animation]");
    selector.onchange = () => localStorage.setItem(key, selector.value);
    return controls;
  }

  function exportHighlightSeriesIndexes(chart) {
    const series = chart.getOption().series || [];
    const indexes = [];
    series.forEach((item, index) => {
      if (item && item.type !== "custom" && item.name !== "__pitch_shapes") indexes.push(index);
    });
    return indexes.length ? indexes : [0];
  }

  function installExportControls(plotEl, chart, traces, layout, args) {
    let wrap = plotEl.parentElement;
    if (!wrap || !wrap.classList.contains("cm-chart-wrap")) {
      wrap = document.createElement("div");
      wrap.className = "cm-chart-wrap";
      plotEl.parentNode.insertBefore(wrap, plotEl);
      wrap.appendChild(plotEl);
    }
    let controls = prepareExportControls(wrap, args);
    controls.querySelector('[data-export="png"]').onclick = () => {
      const bg = contextFromArgs(args || {}).isLight ? "#f8f6f0" : "#071008";
      const url = chart.getDataURL({ type: "png", pixelRatio: 3, backgroundColor: bg, excludeComponents: [] });
      downloadDataUrl(url, `${exportFilenameFromArgs(args || {})}.png`);
    };
    controls.querySelector('[data-export="gif"]').onclick = () => makeChartGif(
      chart, traces, layout, args,
      controls.querySelector('[data-export="gif"]'),
      controls.querySelector('[data-export-animation]').value
    );
  }

  function makeChartGif(chart, traces, layout, args, button, animationMode) {
    if (typeof GIF === "undefined") {
      button.textContent = "NO GIF";
      setTimeout(() => { button.textContent = "GIF"; }, 1200);
      return;
    }
    const old = button.textContent;
    button.textContent = "MAKING";
    button.disabled = true;
    const bg = contextFromArgs(args || {}).isLight ? "#f8f6f0" : "#071008";
    const gif = new GIF({
      workers: 2,
      quality: 10,
      width: chart.getWidth(),
      height: chart.getHeight(),
      workerScript: "gif.worker.js",
      background: bg,
    });
    const mode = animationMode || "build";
    const lineCount = Math.max(1, (traces || []).filter(isLineOnlyTrace).length);
    const traceCount = Math.max(1, (traces || []).length);

    function framePolicy(modeName) {
      if (modeName === "still") return { frames: 2, delay: 1400, finalHold: 0 };
      if (modeName === "pulse") return { frames: Math.min(20, Math.max(8, exportHighlightSeriesIndexes(chart).length * 2)), delay: 160, finalHold: 900 };
      if (modeName === "arrow") return { frames: Math.min(54, Math.max(16, lineCount * 3)), delay: lineCount > 24 ? 95 : 125, finalHold: 1000 };
      if (modeName === "sequence") return { frames: Math.min(48, Math.max(10, traceCount)), delay: traceCount > 30 ? 110 : 170, finalHold: 1100 };
      if (modeName === "network") return { frames: Math.min(42, Math.max(14, lineCount)), delay: lineCount > 28 ? 100 : 150, finalHold: 1000 };
      return { frames: Math.min(36, Math.max(18, lineCount)), delay: 115, finalHold: 1000 };
    }

    function setMapOption(extra) {
      chart.setOption(echartsOptionFromPlotly(traces, layout, args, Object.assign({
        chartSize: { width: chart.getWidth(), height: chart.getHeight() },
        exporting: true,
      }, extra || {})), true);
    }

    function addCanvasFrame(delay) {
      gif.addFrame(chart.getRenderedCanvas({ pixelRatio: 1, backgroundColor: bg }), { copy: true, delay });
    }

    function finishGif(finalDelay) {
      setMapOption();
      setTimeout(() => {
        if (finalDelay !== 0) addCanvasFrame(finalDelay || framePolicy(mode).finalHold || 900);
        gif.render();
      }, 80);
    }

    if (mode === "still") {
      setMapOption();
      setTimeout(() => {
        const policy = framePolicy("still");
        addCanvasFrame(policy.delay);
        addCanvasFrame(policy.delay);
        gif.render();
      }, 80);
    } else if (mode === "pulse") {
      setMapOption();
      const policy = framePolicy("pulse");
      const seriesIndexes = exportHighlightSeriesIndexes(chart);
      let frame = 0;
      function pulseTick() {
        chart.dispatchAction({ type: "downplay" });
        chart.dispatchAction({ type: "highlight", seriesIndex: seriesIndexes[frame % seriesIndexes.length] });
        setTimeout(() => {
          addCanvasFrame(frame === policy.frames - 1 ? policy.finalHold : policy.delay);
          frame += 1;
          if (frame < policy.frames) pulseTick();
          else {
            chart.dispatchAction({ type: "downplay" });
            finishGif(0);
          }
        }, 80);
      }
      pulseTick();
    } else if (mode === "arrow") {
      const policy = framePolicy("arrow");
      let frame = 1;
      function arrowTick() {
        const fraction = frame / policy.frames;
        setMapOption({ revealFraction: fraction, revealMode: "arrow" });
        setTimeout(() => {
          addCanvasFrame(frame === policy.frames ? policy.finalHold : policy.delay);
          frame += 1;
          if (frame <= policy.frames) arrowTick();
          else finishGif(0);
        }, 50);
      }
      arrowTick();
    } else if (mode === "sequence") {
      const policy = framePolicy("sequence");
      let frame = 1;
      function sequenceTick() {
        const visibleTraceCount = Math.ceil(traceCount * (frame / policy.frames));
        setMapOption({ visibleTraceCount, revealFraction: 1 });
        setTimeout(() => {
          addCanvasFrame(frame === policy.frames ? policy.finalHold : policy.delay);
          frame += 1;
          if (frame <= policy.frames) sequenceTick();
          else finishGif(0);
        }, 50);
      }
      sequenceTick();
    } else if (mode === "network") {
      const policy = framePolicy("network");
      let frame = 1;
      setMapOption({ networkLineFraction: 0, revealFraction: 1 });
      setTimeout(() => addCanvasFrame(policy.delay), 80);
      function networkTick() {
        setMapOption({ networkLineFraction: frame / policy.frames, revealFraction: 1 });
        setTimeout(() => {
          addCanvasFrame(frame === policy.frames ? policy.finalHold : policy.delay);
          frame += 1;
          if (frame <= policy.frames) networkTick();
          else finishGif(0);
        }, 50);
      }
      setTimeout(networkTick, 180);
    } else {
      const policy = framePolicy("build");
      const frames = policy.frames;
      let i = 1;
      function renderFraction(fraction) {
        setMapOption({ revealFraction: fraction });
      }
      function addNextFrame() {
        const fraction = i / frames;
        renderFraction(fraction);
        setTimeout(() => {
          addCanvasFrame(i === frames ? policy.finalHold : policy.delay);
          i += 1;
          if (i <= frames) addNextFrame();
          else finishGif(0);
        }, 40);
      }
      addNextFrame();
    }
    gif.on("finished", (blob) => {
      chart.setOption(echartsOptionFromPlotly(traces, layout, args, {
        chartSize: { width: chart.getWidth(), height: chart.getHeight() },
      }), true);
      downloadDataUrl(URL.createObjectURL(blob), `${exportFilenameFromArgs(args || {})}.gif`);
      button.textContent = old;
      button.disabled = false;
    });
  }

  function installOptionExportControls(plotEl, chart, args) {
    let wrap = plotEl.parentElement;
    if (!wrap || !wrap.classList.contains("cm-chart-wrap")) {
      wrap = document.createElement("div");
      wrap.className = "cm-chart-wrap";
      plotEl.parentNode.insertBefore(wrap, plotEl);
      wrap.appendChild(plotEl);
    }
    let controls = prepareExportControls(wrap, args);
    controls.querySelector('[data-export="png"]').onclick = () => {
      const bg = contextFromArgs(args || {}).isLight ? "#f8f6f0" : "#071008";
      downloadDataUrl(chart.getDataURL({ type: "png", pixelRatio: 3, backgroundColor: bg }), `${exportFilenameFromArgs(args || {})}.png`);
    };
    controls.querySelector('[data-export="gif"]').onclick = () => {
      if (typeof GIF === "undefined") {
        const btn = controls.querySelector('[data-export="gif"]');
        btn.textContent = "NO GIF";
        setTimeout(() => { btn.textContent = "GIF"; }, 1200);
        return;
      }
      const btn = controls.querySelector('[data-export="gif"]');
      const old = btn.textContent;
      const bg = contextFromArgs(args || {}).isLight ? "#f8f6f0" : "#071008";
      const mode = controls.querySelector('[data-export-animation]').value || "build";
      const gif = new GIF({
        workers: 2,
        quality: 10,
        width: chart.getWidth(),
        height: chart.getHeight(),
        workerScript: "gif.worker.js",
        background: bg,
      });
      btn.textContent = "MAKING";
      btn.disabled = true;
      if (mode === "still") {
        setTimeout(() => {
          gif.addFrame(chart.getRenderedCanvas({ pixelRatio: 1, backgroundColor: bg }), { copy: true, delay: 1400 });
          gif.addFrame(chart.getRenderedCanvas({ pixelRatio: 1, backgroundColor: bg }), { copy: true, delay: 1400 });
          gif.render();
        }, 80);
      } else {
      let frame = 0;
      const maxFrames = mode === "pulse" ? 20 : mode === "still" ? 2 : mode === "network" ? 18 : mode === "sequence" ? 18 : 24;
      const frameDelay = mode === "arrow" ? 120 : mode === "sequence" ? 155 : mode === "network" ? 145 : 140;
      const finalHold = mode === "arrow" || mode === "network" || mode === "sequence" ? 1000 : 900;
      const seriesIndexes = exportHighlightSeriesIndexes(chart);
      function tick() {
        chart.dispatchAction({ type: "highlight", seriesIndex: seriesIndexes[frame % seriesIndexes.length] });
        setTimeout(() => {
          gif.addFrame(chart.getRenderedCanvas({ pixelRatio: 1, backgroundColor: bg }), { copy: true, delay: frame === maxFrames - 1 ? finalHold : frameDelay });
          chart.dispatchAction({ type: "downplay" });
          frame += 1;
          if (frame < maxFrames) tick();
          else {
            gif.render();
          }
        }, 90);
      }
      tick();
      }
      gif.on("finished", (blob) => {
        downloadDataUrl(URL.createObjectURL(blob), `${exportFilenameFromArgs(args || {})}.gif`);
        btn.textContent = old;
        btn.disabled = false;
      });
    };
  }

  function numericBoxValue(value, fallback) {
    if (typeof value === "number" && Number.isFinite(value)) return value;
    if (typeof value === "string") {
      const parsed = Number(value.replace("px", ""));
      if (Number.isFinite(parsed)) return parsed;
    }
    return fallback;
  }

  function fitNativePitchOption(option, plotEl, requestedHeight) {
    const aspect = Number(option && option.cmPitchAspect);
    if (!Number.isFinite(aspect) || aspect <= 0) return;
    const grid = Object.assign({ left: 20, right: 20, top: 72, bottom: 42 }, Array.isArray(option.grid) ? option.grid[0] : option.grid || {});
    const margins = {
      left: numericBoxValue(grid.left, 20),
      right: numericBoxValue(grid.right, 20),
      top: numericBoxValue(grid.top, 72),
      bottom: numericBoxValue(grid.bottom, 42),
    };
    const chartWidth = Math.max(1, (plotEl && plotEl.clientWidth) || (plotEl && plotEl.parentElement && plotEl.parentElement.clientWidth) || window.innerWidth || 1);
    const desiredHeight = Math.round(Math.max(requestedHeight, Math.min(900, margins.top + margins.bottom + ((chartWidth - margins.left - margins.right) / aspect))));
    if (plotEl && Math.abs(plotEl.clientHeight - desiredHeight) > 2) plotEl.style.height = `${desiredHeight}px`;
    const chartHeight = desiredHeight;
    const rect = fitRectToAspect({
      left: margins.left,
      top: margins.top,
      width: Math.max(1, chartWidth - margins.left - margins.right),
      height: Math.max(1, chartHeight - margins.top - margins.bottom),
    }, aspect);
    const fittedGrid = Object.assign({}, grid, {
      left: Math.round(rect.left),
      top: Math.round(rect.top),
      width: Math.round(rect.width),
      height: Math.round(rect.height),
      right: undefined,
      bottom: undefined,
      containLabel: false,
    });
    option.grid = Array.isArray(option.grid) ? [fittedGrid].concat(option.grid.slice(1)) : fittedGrid;
    if (Array.isArray(option.graphic)) {
      option.graphic = option.graphic.map((item) => {
        if (!item || item.type !== "rect" || item.cmPitchBackground !== true) return item;
        return Object.assign({}, item, {
          left: Math.round(rect.left),
          top: Math.round(rect.top),
          shape: { width: Math.round(rect.width), height: Math.round(rect.height) },
          right: undefined,
          bottom: undefined,
        });
      });
    }
  }

  function renderEchartsOption(args) {
    const plotEl = document.getElementById("plot");
    document.getElementById("no-data").style.display = "none";
    plotEl.style.display = "block";
    plotEl.style.height = `${Number(args.height || 520)}px`;
    ensureEChartsReady().then(() => {
      if (!_cmChart || _cmChart.getDom() !== plotEl) {
        if (_cmChart) _cmChart.dispose();
        _cmChart = echarts.init(plotEl, null, { renderer: ECHARTS_RENDERER });
      }
      const option = Object.assign({}, args.option || {});
      fitNativePitchOption(option, plotEl, Number(args.height || 520) || 520);
      option.tooltip = Object.assign({
        trigger: "item",
        confine: true,
        formatter(params) {
          const data = params && params.data || {};
          return data.tooltip || data.tooltipText || params.name || "";
        },
      }, option.tooltip || {});
      _cmChart.setOption(option, true);
      installResizeHandler(() => {
        if (_cmChart && _cmChart.getDom() === plotEl) {
          fitNativePitchOption(option, plotEl, Number(args.height || 520) || 520);
          _cmChart.resize();
          _cmChart.setOption(option, true);
          Streamlit.setHeight(plotEl.offsetHeight + 4);
        }
      });
      installOptionExportControls(plotEl, _cmChart, args);
      Streamlit.setHeight(plotEl.offsetHeight + 4);
    });
  }

  function cmNewPlot(plotEl, traces, layout, args) {
    _cmLastRender = { traces, layout, args };
    const requestedHeight = Number(layout && layout.height || args && args.height || 520) || 520;
    plotEl.style.height = `${requestedHeight}px`;
    const pitchHeight = autoHeightForHorizontalPitch(layout || {}, args || {}, plotEl);
    if (pitchHeight) plotEl.style.height = `${pitchHeight}px`;
    plotEl.removeAllListeners = function() { _cmPlotlyClickHandler = null; };
    plotEl.on = function(eventName, handler) {
      if (eventName === "plotly_click") _cmPlotlyClickHandler = handler;
    };
    return ensureEChartsReady().then(() => {
      if (!_cmChart || _cmChart.getDom() !== plotEl) {
        if (_cmChart) _cmChart.dispose();
        _cmChart = echarts.init(plotEl, null, { renderer: ECHARTS_RENDERER });
      }
      const renderOption = () => echartsOptionFromPlotly(traces, layout, args, {
        chartSize: { width: plotEl.clientWidth || _cmChart.getWidth(), height: plotEl.clientHeight || _cmChart.getHeight() },
      });
      const option = renderOption();
      _cmChart.off("click");
      _cmChart.on("click", (params) => {
        if (!_cmPlotlyClickHandler || !params || !params.data) return;
        _cmPlotlyClickHandler({ points: [{ customdata: params.data.customdata, data: params.data.value }] });
      });
      _cmChart.setOption(option, true);
      installResizeHandler(() => {
        if (_cmChart && _cmChart.getDom() === plotEl) {
          const resizedHeight = autoHeightForHorizontalPitch(layout || {}, args || {}, plotEl);
          if (resizedHeight) plotEl.style.height = `${resizedHeight}px`;
          _cmChart.resize();
          _cmChart.setOption(renderOption(), true);
          Streamlit.setHeight(plotEl.offsetHeight + 4);
        }
      });
      installExportControls(plotEl, _cmChart, traces, layout, args);
    });
  }

  // ════════════════════════════════════════════════════════════════════════════
  // SHOT MAP — based on working Shot Map Parlour
  // ════════════════════════════════════════════════════════════════════════════
  function buildShotTrace(shotList, isHome, teamName, selectedIdx, isGF) {
    if (!shotList.length) {
      return { x:[], y:[], mode:"markers", name:teamName, type:"scatter",
        marker:{size:12, color:isHome?HOME_HEX:AWAY_HEX}, showlegend:true };
    }
    const xs=[], ys=[], colors=[], symbols=[], sizes=[], texts=[], cd=[], lineColors=[], lineWidths=[], lineDashes=[];
    for (const s of shotList) {
      xs.push(s._px); ys.push(s._py);
      const baseFill = shotColor(isHome);
      const baseLine = borderColor(isHome);
      if (s.type === "Goal") {
        colors.push(baseFill);
        symbols.push("circle");
        lineColors.push(baseLine);
        lineWidths.push(2.4);
        lineDashes.push("solid");
      } else if (s.type === "BlockedShot") {
        colors.push("rgba(0,0,0,0)");
        symbols.push("circle-open");
        lineColors.push(baseLine);
        lineWidths.push(2.4);
        lineDashes.push("solid");
      } else if (s.type === "SavedShot" || s.type === "AttemptSaved") {
        colors.push("rgba(0,0,0,0)");
        symbols.push("circle-open");
        lineColors.push(baseLine);
        lineWidths.push(2.4);
        lineDashes.push("dot");
      } else if (MISSED.has(s.type)) {
        colors.push(baseFill);
        symbols.push("x");
        lineColors.push(baseLine);
        lineWidths.push(2);
        lineDashes.push("solid");
      } else {
        colors.push(baseFill);
        symbols.push("circle");
        lineColors.push(baseLine);
        lineWidths.push(2);
        lineDashes.push("solid");
      }
      sizes.push(s.df_idx === selectedIdx ? 22 : 13);
      const sec = String(s.second).padStart(2,"0");
      const et = (s.period||"").includes("ExtraTime") ? " ET" : "";
      texts.push(`<b>${s.playerName||""}</b><br>${s.minute}'${sec}"${et}<br>${s.type}`);
      cd.push(s.df_idx);
    }
    return { x:xs, y:ys, mode:"markers", name:teamName, type:"scatter",
      text:texts, hovertemplate:"%{text}<extra></extra>", customdata:cd,
      marker:{ size:sizes, color:colors, symbol:symbols, line:{color:lineColors,width:lineWidths,dash:lineDashes} },
      showlegend:true };
  }

  function renderShotMap(args) {
    const isLight    = args.light_mode === true;
    const _pitchBG   = isLight ? LIGHT_PITCH_BG : PITCH_BG;
    const _pitchLine = isLight ? LIGHT_PITCH_LINE : PITCH_LINE;
    const _pitchThick= isLight ? LIGHT_PITCH_THICK : PITCH_THICK;
    const _hudGreen  = isLight ? LIGHT_HUD_GREEN : HUD_GREEN;
    const _goalFill  = isLight ? LIGHT_GOAL_FILL : "rgba(255,255,255,0.04)";
    const _gfLine    = isLight ? LIGHT_GOAL_LINE : "#ffffff";
    const _gfFrame   = isLight ? LIGHT_GOALFRAME_FILL : "rgba(255,255,255,0.08)";
    const _legendFont= isLight ? LIGHT_LEGEND_FONT : "#ffffff";
    const _annoColor = isLight ? LIGHT_ANNO_COLOR : "#adaaaa";
    const shots      = args.shots      || [];
    const homeTeam   = args.home_team  || "Home";
    const awayTeam   = args.away_team  || "Away";
    const selectedIdx= args.selected_idx;
    const view       = args.view       || "pitch";
    const height     = args.height     || 460;
    const isGF = view === "goalframe";
    const isHPV = view === "halfpitch_vert";
    const isHP = view === "halfpitch";

    let toPlot = shots;
    if (isGF) toPlot = shots.filter(s => s.goal_mouth_y != null && s.goal_mouth_z != null);

    for (const s of toPlot) {
      if (isGF) {
        s._px = 100 - s.goal_mouth_y;
        s._py = s.goal_mouth_z;
      } else if (isHPV) {
        s._px = 100 - s.y;
        s._py = 100 - s.x;
      } else {
        s._px = s.x;
        s._py = 100 - s.y;
      }
    }

    const homeShots = toPlot.filter(s => s.is_home);
    const awayShots = toPlot.filter(s => !s.is_home);
    const noData = toPlot.length === 0;
    document.getElementById("no-data").style.display = noData ? "block" : "none";
    document.getElementById("plot").style.display = noData ? "none" : "block";

    const traces = [
      buildShotTrace(homeShots, true, homeTeam, selectedIdx, isGF),
      buildShotTrace(awayShots, false, awayTeam, selectedIdx, isGF),
    ];

    const gMid = (GOAL_Y_LEFT + GOAL_Y_RIGHT) / 2;
    const annotations = isGF ? [
      {x:GOAL_Y_LEFT,y:-6,text:"Post",showarrow:false,font:{color:_annoColor,size:10}},
      {x:GOAL_Y_RIGHT,y:-6,text:"Post",showarrow:false,font:{color:_annoColor,size:10}},
      {x:gMid,y:GOAL_Z_TOP+4,text:"Crossbar",showarrow:false,font:{color:_annoColor,size:10}},
    ] : [];

    const selectedShot = selectedIdx != null ? toPlot.find(s => s.df_idx === selectedIdx) : null;

    let xRange, yRange, scaleRatio, shapes;
    if (isGF) {
      const expanded = expandedGoalframeRangeForShot(
        selectedShot,
        NORMAL_GOALFRAME_X_RANGE,
        NORMAL_GOALFRAME_Y_RANGE,
        NORMAL_GOALFRAME_EXPAND_MARGIN_X,
        NORMAL_GOALFRAME_EXPAND_MARGIN_Y
      );
      xRange=expanded.xRange; yRange=expanded.yRange; scaleRatio=GOAL_SCALERATIO; shapes=goalframeShapes(xRange, yRange, _gfLine, _gfFrame, _pitchBG, _pitchLine);
    } else if (isHPV) {
      xRange=[-5,105]; yRange=[55,-5]; scaleRatio=VERTICAL_PITCH_SCALERATIO; shapes=halfPitchVertShapes(_pitchLine, _pitchThick, _pitchBG, _goalFill);
    } else if (isHP) {
      xRange=[50,105]; yRange=[105,-5]; scaleRatio=HORIZONTAL_PITCH_SCALERATIO; shapes=halfPitchShapes(_pitchLine, _pitchThick, _pitchBG, _goalFill);
    } else {
      xRange=[-5,105]; yRange=[105,-5]; scaleRatio=HORIZONTAL_PITCH_SCALERATIO; shapes=pitchShapes(_pitchLine, _pitchThick, _pitchBG, _goalFill);
    }

    const layout = {
      paper_bgcolor:"rgba(0,0,0,0)", plot_bgcolor:_pitchBG,
      margin:{l:0,r:0,t:isGF?20:0,b:0}, height:height,
      showlegend:!isGF,
      legend:{orientation:"h",yanchor:"bottom",y:1.02,xanchor:"left",x:0,font:{color:_legendFont,size:12},bgcolor:"rgba(0,0,0,0)"},
      xaxis:{range:xRange,showgrid:false,zeroline:false,showticklabels:false,fixedrange:true},
      yaxis:{range:yRange,showgrid:false,zeroline:false,showticklabels:false,fixedrange:true,scaleanchor:"x",scaleratio:scaleRatio},
      shapes:shapes, annotations:annotations, dragmode:false,
    };

    const plotEl = document.getElementById("plot");
    cmNewPlot(plotEl, traces, layout, args).then(() => {
      Streamlit.setHeight(plotEl.offsetHeight + 4);
      plotEl.removeAllListeners("plotly_click");
      plotEl.on("plotly_click", function(data) {
        if (!data || !data.points || !data.points.length) return;
        const dfIdx = data.points[0].customdata;
        if (dfIdx != null) Streamlit.setValue([dfIdx, Date.now()]);
      });
    });
  }

  // ════════════════════════════════════════════════════════════════════════════
  // PASS MAP — player passes and pass network
  // ════════════════════════════════════════════════════════════════════════════
  function renderPassMap(args) {
    const isLight    = args.light_mode === true;
    const _pitchBG   = isLight ? LIGHT_PITCH_BG : PITCH_BG;
    const _pitchLine = isLight ? LIGHT_PITCH_LINE : PITCH_LINE;
    const _pitchThick= isLight ? LIGHT_PITCH_THICK : PITCH_THICK;
    const _hudGreen  = isLight ? LIGHT_HUD_GREEN : HUD_GREEN;
    const passes     = args.passes      || [];
    const homeTeam   = args.home_team   || "";
    const awayTeam   = args.away_team   || "";
    const selectedIdx= args.selected_idx != null ? args.selected_idx : null;
    const mode       = args.mode        || "player";
    const height     = args.height      || 520;

    document.getElementById("no-data").style.display = passes.length ? "none" : "block";
    document.getElementById("plot").style.display = passes.length ? "block" : "none";
    if (!passes.length) { Streamlit.setHeight(100); return; }

    if (mode === "network") renderPassNetwork(passes, homeTeam, awayTeam, height, _pitchBG, _pitchLine, _pitchThick, isLight, args);
    else renderPlayerPassMap(passes, homeTeam, awayTeam, selectedIdx, height, _pitchBG, _pitchLine, _pitchThick, _hudGreen, isLight, args);
  }


  function renderPlayerPassMap(passes, homeTeam, awayTeam, selectedIdx, height, _pitchBG, _pitchLine, _pitchThick, _hudGreen, isLight, args) {
    const plotEl = document.getElementById("plot");
    const shapes = horizontalPitchShapes(
      _pitchLine, _pitchThick, _pitchBG,
      isLight ? LIGHT_GOAL_FILL : "rgba(255,255,255,0.04)",
      isLight ? "rgba(30,70,10,0.08)" : undefined,
      isLight ? "rgba(47,93,22,0.055)" : undefined,
      isLight ? "rgba(47,93,22,0.16)" : undefined
    );
    const dimmed = selectedIdx !== null;
    const traces = [];

    // Horizontal player map: attack direction is left-to-right.
    passes.forEach(p => {
      if (p.x == null || p.endX == null) return;
      const isSelected = selectedIdx === p.df_idx;
      const col = isLight ? lightModeAccent(p.successful ? SUCC_HEX : FAIL_HEX) : (p.successful ? SUCC_HEX : FAIL_HEX);
      const lineAlpha = dimmed ? (isSelected ? 0.86 : 0.10) : 0.42;
      const dotAlpha = dimmed ? (isSelected ? 1.0 : 0.18) : 0.92;
      const sx=p.x, sy=100-p.y, ex=p.endX, ey=100-p.endY;

      traces.push({
        x:[sx,ex], y:[sy,ey], mode:"lines",
        line:{color:hexToRgba(col,lineAlpha),width:isSelected?4:2.2},
        hoverinfo:"none", showlegend:false,
      });
      traces.push({
        x:[ex], y:[ey], mode:"markers",
        marker:{color:hexToRgba(col,dotAlpha),size:isSelected?18:11,symbol:"circle",
          line:{color:isSelected?col:(isLight ? LIGHT_MARKER_BORDER : DARK_MARKER_BORDER),width:isSelected?3:1.8}},
        text:[`${p.playerName}<br>${p.minute}'${String(p.second).padStart(2,'0')}"<br>${p.successful?"✅ Successful":"❌ Unsuccessful"}`],
        hovertemplate:"%{text}<extra></extra>",
        customdata:[[p.df_idx, Date.now()]], showlegend:false,
      });
    });

    const layout = {
      paper_bgcolor:"rgba(0,0,0,0)", plot_bgcolor:_pitchBG || PITCH_BG,
      margin:{l:5,r:5,t:5,b:5}, height:height,
      xaxis:{range:[-5,105],showgrid:false,zeroline:false,showticklabels:false,fixedrange:true},
      yaxis:{range:[105,-5],showgrid:false,zeroline:false,showticklabels:false,fixedrange:true,scaleanchor:"x",scaleratio:HORIZONTAL_PITCH_SCALERATIO},
      shapes:shapes, annotations:[attackDirectionAnnotation(_hudGreen)], dragmode:false, showlegend:false,
    };

    cmNewPlot(plotEl, traces, layout, args).then(() => {
      Streamlit.setHeight(plotEl.offsetHeight + 4);
      plotEl.on("plotly_click", function(data) {
        if (!data || !data.points || !data.points.length) return;
        const pt = data.points[0];
        if (pt.customdata) Streamlit.setValue(pt.customdata);
      });
    });
  }

  function installPassNetworkControls(plotEl, storageKey, controls, onChange) {
    let wrap = plotEl.parentElement;
    if (!wrap || !wrap.classList.contains("cm-chart-wrap")) return;
    let panel = wrap.querySelector(".cm-network-controls");
    if (!panel) {
      panel = document.createElement("div");
      panel.className = "cm-network-controls";
      wrap.appendChild(panel);
    }
    const selected = (name, value) => controls[name] === value ? " selected" : "";
    panel.innerHTML = [
      '<select data-net-control="segment" title="Time segment">',
      `<option value="before"${selected("segment","before")}>Before subs</option>`,
      `<option value="after"${selected("segment","after")}>After subs</option>`,
      '</select>',
      '<select data-net-control="min" title="Minimum passes per link">',
      `<option value="1"${selected("min","1")}>1+ links</option>`,
      `<option value="2"${selected("min","2")}>2+ links</option>`,
      `<option value="3"${selected("min","3")}>3+ links</option>`,
      `<option value="5"${selected("min","5")}>5+ links</option>`,
      '</select>',
    ].join("");
    panel.querySelectorAll("select").forEach((select) => {
      select.onchange = () => {
        const next = Object.assign({}, controls);
        panel.querySelectorAll("select").forEach((el) => { next[el.dataset.netControl] = el.value; });
        localStorage.setItem(storageKey, JSON.stringify(next));
        onChange();
      };
    });
  }

  function renderPassNetwork(passes, homeTeam, awayTeam, height, _pitchBG, _pitchLine, _pitchThick, isLight, args) {
    const plotEl = document.getElementById("plot");
    const _pl = _pitchLine || PITCH_LINE;
    const _pt = _pitchThick || PITCH_THICK;
    const _pb = _pitchBG || PITCH_BG;
    const _gf = isLight ? LIGHT_GOAL_FILL : "rgba(255,255,255,0.04)";
    const _starterColor = isLight ? LIGHT_PASS_LABEL : "#ffffff";
    const _subColor = isLight ? LIGHT_ANNO_COLOR : "#adaaaa";
    const controlKey = `clipmaker:pass-network:${homeTeam || "home"}:${awayTeam || "away"}`;
    const defaultControls = { segment: "before", min: "2" };
    const controls = Object.assign({}, defaultControls, JSON.parse(localStorage.getItem(controlKey) || "{}"));
    const passSecond = (p) => {
      const minute = Number(p && p.minute || 0);
      const second = Number(p && p.second || 0);
      return (Number.isFinite(minute) ? minute : 0) * 60 + (Number.isFinite(second) ? second : 0);
    };
    const sortedPasses = (passes || []).slice().sort((a, b) => {
      const pa = String(a.period || "");
      const pb = String(b.period || "");
      if (pa !== pb) return pa.localeCompare(pb);
      return passSecond(a) - passSecond(b);
    });
    const subFirstTimes = {};
    sortedPasses.forEach((p) => {
      if (p && p.playerName && p.is_starter === false) {
        const t = passSecond(p);
        if (subFirstTimes[p.playerName] == null || t < subFirstTimes[p.playerName]) subFirstTimes[p.playerName] = t;
      }
    });
    const subTimes = Object.values(subFirstTimes);
    const firstSubSecond = subTimes.length ? Math.min(...subTimes) : null;
    const allSubsSecond = subTimes.length ? Math.max(...subTimes) : null;
    let networkPasses = sortedPasses.filter((p) => {
      if (controls.segment === "before") return firstSubSecond == null ? true : passSecond(p) < firstSubSecond;
      if (controls.segment === "after") return allSubsSecond == null ? true : passSecond(p) >= allSubsSecond;
      return true;
    });

    // Build player data with starter info
    const players = {};
    networkPasses.forEach(p => {
      if (!p.playerName || p.x == null) return;
      if (!players[p.playerName]) {
        players[p.playerName] = {xs:[],ys:[],count:0,isHome:p.is_home,team:p.team,isStarter:p.is_starter!==false};
      }
      players[p.playerName].xs.push(p.x);
      players[p.playerName].ys.push(p.y);
      players[p.playerName].count++;
    });

    const nodes = {};
    Object.entries(players).forEach(([name,d]) => {
      nodes[name] = {
        ax:d.xs.reduce((a,b)=>a+b,0)/d.xs.length,
        ay:d.ys.reduce((a,b)=>a+b,0)/d.ys.length,
        count:d.count, isHome:d.isHome, team:d.team, isStarter:d.isStarter,
      };
    });

    const conns = {};
    for (let i=0; i<networkPasses.length-1; i++) {
      const a=networkPasses[i], b=networkPasses[i+1];
      if (!a.playerName||!b.playerName) continue;
      if (a.team!==b.team||a.playerName===b.playerName) continue;
      const key=[a.playerName,b.playerName].sort().join("|||");
      conns[key]=(conns[key]||0)+1;
    }

    const homeNodes=Object.entries(nodes).filter(([,n])=>n.isHome);
    const awayNodes=Object.entries(nodes).filter(([,n])=>!n.isHome);
    const minFreq = Math.max(1, Number(controls.min || 2) || 2);
    function filteredConns(isHome) {
      return Object.entries(conns)
        .filter(([k, freq]) => {
          const [a, b]=k.split("|||");
          return nodes[a] && nodes[b] && nodes[a].isHome === isHome && freq >= minFreq;
        })
        .sort((a, b) => b[1] - a[1]);
    }
    const homeConns=filteredConns(true);
    const awayConns=filteredConns(false);

    const homeMaxConn=Math.max(...homeConns.map(([,f])=>f),1);
    const awayMaxConn=Math.max(...awayConns.map(([,f])=>f),1);
    const homeMaxCount=Math.max(...homeNodes.map(([,n])=>n.count),1);
    const awayMaxCount=Math.max(...awayNodes.map(([,n])=>n.count),1);

    function buildTeamTraces(teamNodes,teamConns,maxConn,maxCount,baseHex,xaxis,yaxis) {
      const traces=[];
      const displayHex = isLight ? lightModeAccent(baseHex) : baseHex;
      const [br,bg,bb]=[parseInt(displayHex.slice(1,3),16),parseInt(displayHex.slice(3,5),16),parseInt(displayHex.slice(5,7),16)];

      // Connection lines: transform WhoScored→portrait (display x=100-y, display y=100-x)
      teamConns.forEach(([key,freq]) => {
        const [a,b]=key.split("|||");
        if (!nodes[a]||!nodes[b]) return;
        const weight = freq/maxConn;
        const alpha=(isLight ? 0.22 : 0.10)+(isLight ? 0.64 : 0.58)*weight;
        traces.push({
          x:[100-nodes[a].ay, 100-nodes[b].ay], y:[100-nodes[a].ax, 100-nodes[b].ax],
          xaxis:xaxis, yaxis:yaxis, mode:"lines",
          line:{color:`rgba(${br},${bg},${bb},${alpha})`,width:0.8+4.2*weight},
          hoverinfo:"none", showlegend:false,
        });
      });

      // Starters (circles)
      const starters=teamNodes.filter(([,n])=>n.isStarter);
      if (starters.length) {
        traces.push({
          x:starters.map(([,n])=>100-n.ay), y:starters.map(([,n])=>100-n.ax),
          xaxis:xaxis, yaxis:yaxis, mode:"markers+text",
          marker:{
            color:starters.map(([,n])=>`rgba(${br},${bg},${bb},${0.25+0.7*(n.count/maxCount)})`),
            size:starters.map(([,n])=>14+14*(n.count/maxCount)), symbol:"circle",
            line:{color:displayHex,width:isLight ? 2.4 : 2},
          },
          text:starters.map(([name])=>name.split(" ").pop()),
          textposition:"top center", textfont:{size:9,color:_starterColor,bgcolor:isLight ? "rgba(248,246,240,0.92)" : "rgba(7,16,8,0.60)"},
          hovertext:starters.map(([name,n])=>`${name}<br>${n.count} passes`),
          hovertemplate:"%{hovertext}<extra></extra>", showlegend:false,
        });
      }

      // Subs (smaller squares)
      const subs=teamNodes.filter(([,n])=>!n.isStarter);
      if (subs.length) {
        traces.push({
          x:subs.map(([,n])=>100-n.ay), y:subs.map(([,n])=>100-n.ax),
          xaxis:xaxis, yaxis:yaxis, mode:"markers+text",
          marker:{
            color:subs.map(([,n])=>`rgba(${br},${bg},${bb},${0.25+0.7*(n.count/maxCount)})`),
            size:subs.map(([,n])=>8+8*(n.count/maxCount)), symbol:"square",
            line:{color:displayHex,width:isLight ? 2 : 1.5},
          },
          text:subs.map(([name])=>name.split(" ").pop()),
          textposition:"top center", textfont:{size:8,color:_subColor,bgcolor:isLight ? "rgba(248,246,240,0.92)" : "rgba(7,16,8,0.60)"},
          hovertext:subs.map(([name,n])=>`${name} (sub)<br>${n.count} passes`),
          hovertemplate:"%{hovertext}<extra></extra>", showlegend:false,
        });
      }

      return traces;
    }

    const traces=[
      ...buildTeamTraces(homeNodes,homeConns,homeMaxConn,homeMaxCount,HOME_HEX,"x","y"),
      ...buildTeamTraces(awayNodes,awayConns,awayMaxConn,awayMaxCount,AWAY_HEX,"x2","y2"),
    ];

    // Pitch shapes for both subplots
    const shapes1=fullPitchVertShapes(_pl, _pt, _pb, _gf);
    const shapes2=fullPitchVertShapes(_pl, _pt, _pb, _gf).map(s => {
      const ns=Object.assign({},s);
      ns.xref="x2"; ns.yref="y2";
      if (ns.line) ns.line=Object.assign({},ns.line);
      return ns;
    });

    const layout = {
      paper_bgcolor:"rgba(0,0,0,0)", plot_bgcolor:"rgba(0,0,0,0)",
      margin:{l:0,r:0,t:25,b:10}, height:height, dragmode:false, showlegend:false,
      xaxis: {range:[-5,105],showgrid:false,zeroline:false,showticklabels:false,fixedrange:true,domain:[0,0.48]},
      yaxis: {range:[105,-5],showgrid:false,zeroline:false,showticklabels:false,fixedrange:true,scaleanchor:"x",scaleratio:1.5},
      xaxis2:{range:[-5,105],showgrid:false,zeroline:false,showticklabels:false,fixedrange:true,domain:[0.52,1],anchor:"y2"},
      yaxis2:{range:[105,-5],showgrid:false,zeroline:false,showticklabels:false,fixedrange:true,scaleanchor:"x2",scaleratio:1.5,anchor:"x2"},
      shapes:[...shapes1,...shapes2],
      annotations:[
        {x:50,y:107,xref:"x",yref:"y",text:`<b>${homeTeam}</b>`,showarrow:false,font:{size:13,color:HOME_HEX}},
        {x:50,y:107,xref:"x2",yref:"y2",text:`<b>${awayTeam}</b>`,showarrow:false,font:{size:13,color:AWAY_HEX}},
      ],
    };

    cmNewPlot(plotEl, traces, layout, args).then(() => {
      installPassNetworkControls(plotEl, controlKey, controls, () => renderPassNetwork(passes, homeTeam, awayTeam, height, _pitchBG, _pitchLine, _pitchThick, isLight, args));
      Streamlit.setHeight(plotEl.offsetHeight + 4);
    });
  }

  // ════════════════════════════════════════════════════════════════════════════
  // DEFENSIVE MAP — horizontal full pitch (left→right attack)
  // ════════════════════════════════════════════════════════════════════════════
  function renderDefensiveMap(args) {
    const isLight    = args.light_mode === true;
    const _pitchBG   = isLight ? LIGHT_PITCH_BG : PITCH_BG;
    const _pitchLine = isLight ? LIGHT_PITCH_LINE : PITCH_LINE;
    const _pitchThick= isLight ? LIGHT_PITCH_THICK : PITCH_THICK;
    const _hudGreen  = isLight ? LIGHT_HUD_GREEN : HUD_GREEN;
    const _goalFill  = isLight ? LIGHT_GOAL_FILL : "rgba(255,255,255,0.04)";
    const _markerBorder = isLight ? LIGHT_MARKER_BORDER : DARK_MARKER_BORDER;
    const _legendFont = isLight ? LIGHT_LEGEND_FONT : "#adaaaa";
    const actions    = args.actions     || [];
    const homeTeam   = args.home_team   || "";
    const selectedIdx= args.selected_idx != null ? args.selected_idx : null;
    const height     = args.height      || 620;

    document.getElementById("no-data").style.display = actions.length ? "none" : "block";
    document.getElementById("plot").style.display = actions.length ? "block" : "none";
    if (!actions.length) { Streamlit.setHeight(100); return; }

    const plotEl = document.getElementById("plot");
    const shapes = horizontalPitchShapes(
      _pitchLine, _pitchThick, _pitchBG, _goalFill,
      isLight ? "rgba(30,70,10,0.08)" : undefined,
      isLight ? "rgba(47,93,22,0.055)" : undefined,
      isLight ? "rgba(47,93,22,0.16)" : undefined
    );
    const dimmed = selectedIdx !== null;
    const traces = [];
    const stackConnectorTraces = [];

    const displayPoint = (a) => ({ x:a.x, y:100-a.y });
    const clampPitch = (v) => Math.max(2, Math.min(98, v));
    const actionSecond = (a) => {
      const minute = Number(a.minute || 0);
      const second = Number(a.second || 0);
      return (Number.isFinite(minute) ? minute : 0) * 60 + (Number.isFinite(second) ? second : 0);
    };
    const parent = actions.map((_, i) => i);
    const find = (i) => {
      while (parent[i] !== i) {
        parent[i] = parent[parent[i]];
        i = parent[i];
      }
      return i;
    };
    const unite = (a, b) => {
      const ra = find(a), rb = find(b);
      if (ra !== rb) parent[rb] = ra;
    };

    actions.forEach((a, i) => {
      const p = displayPoint(a);
      a._plotX = p.x;
      a._plotY = p.y;
      a._stackSize = 1;
    });

    for (let i = 0; i < actions.length; i++) {
      for (let j = i + 1; j < actions.length; j++) {
        const samePeriod = String(actions[i].period || "") === String(actions[j].period || "");
        if (samePeriod && Math.abs(actionSecond(actions[i]) - actionSecond(actions[j])) <= 6) {
          unite(i, j);
        }
      }
    }

    const stacks = {};
    actions.forEach((a, i) => {
      const root = find(i);
      if (!stacks[root]) stacks[root] = [];
      stacks[root].push(a);
    });

    Object.values(stacks).forEach(stack => {
      if (stack.length < 2) return;
      const radius = Math.min(5, 2.4 + stack.length * 0.45);
      stack.forEach((a, i) => {
        const p = displayPoint(a);
        const angle = -Math.PI / 2 + (2 * Math.PI * i / stack.length);
        a._plotX = clampPitch(p.x + Math.cos(angle) * radius);
        a._plotY = clampPitch(p.y + Math.sin(angle) * radius);
        a._stackSize = stack.length;
      });
      const ordered = [...stack].sort((a, b) => (actionSecond(a) - actionSecond(b)) || (a._plotY - b._plotY) || (a._plotX - b._plotX));
      stackConnectorTraces.push({
        x: ordered.map(a => a._plotX),
        y: ordered.map(a => a._plotY),
        mode: "lines",
        name: "Stack link",
        line: { color: isLight ? "rgba(126,82,0,0.90)" : "rgba(255,225,0,0.95)", width: isLight ? 3.4 : 3 },
        hoverinfo: "skip",
        showlegend: false,
      });
    });

    traces.push(...stackConnectorTraces);

    const byType = {};
    actions.forEach(a => { if (!byType[a.type]) byType[a.type]=[]; byType[a.type].push(a); });

    Object.entries(byType).forEach(([atype,acts]) => {
      const style = DEF_STYLE[atype] || {color:"#aaa",symbol:"circle"};
      const displayColor = isLight ? lightModeAccent(style.color) : style.color;
      traces.push({
        x:acts.map(a=>a._plotX), y:acts.map(a=>a._plotY), mode:"markers", name:atype,
        marker:{
          color:acts.map(a=>{
            const isSel=selectedIdx===a.df_idx;
              const alpha=dimmed?(isSel?1.0:0.18):0.92;
            const [r,g,b]=[parseInt(displayColor.slice(1,3),16),parseInt(displayColor.slice(3,5),16),parseInt(displayColor.slice(5,7),16)];
            return `rgba(${r},${g},${b},${alpha})`;
          }),
          size:acts.map(a=>selectedIdx===a.df_idx?28:19), symbol:style.symbol,
           line:{color:acts.map(a=>(selectedIdx===a.df_idx)?displayColor:_markerBorder),
                width:acts.map(a=>selectedIdx===a.df_idx?3.5:2.2)},
        },
        text:acts.map(a=>`${a.playerName}<br>${a.minute}'${String(a.second).padStart(2,'0')}"<br>${a.type}<br>${a.outcomeType||""}${a._stackSize > 1 ? `<br>Stacked with ${a._stackSize - 1} other action${a._stackSize > 2 ? "s" : ""}` : ""}`),
        hovertemplate:"%{text}<extra></extra>",
        customdata:acts.map(a=>[a.df_idx, Date.now()]),
        showlegend:true,
      });
    });

    const layout = {
      paper_bgcolor:"rgba(0,0,0,0)", plot_bgcolor:_pitchBG,
      margin:{l:5,r:5,t:5,b:5}, height:height,
      xaxis:{range:[-5,105],showgrid:false,zeroline:false,showticklabels:false,fixedrange:true},
      yaxis:{range:[105,-5],showgrid:false,zeroline:false,showticklabels:false,fixedrange:true,scaleanchor:"x",scaleratio:HORIZONTAL_PITCH_SCALERATIO},
      shapes:shapes, annotations:[attackDirectionAnnotation(_hudGreen)], dragmode:false,
      legend:{orientation:"h",y:-0.04,x:0.5,xanchor:"center",bgcolor:"rgba(0,0,0,0)",font:{size:11,color:_legendFont}},
      showlegend:true,
    };

    cmNewPlot(plotEl, traces, layout, args).then(() => {
      Streamlit.setHeight(plotEl.offsetHeight + 4);
      plotEl.on("plotly_click", function(data) {
        if (!data || !data.points || !data.points.length) return;
        const pt = data.points[0];
        if (pt.customdata) Streamlit.setValue(pt.customdata);
      });
    });
  }

  // ════════════════════════════════════════════════════════════════════════════
  // ROI SELECTOR — click-and-drag rectangle on a video frame
  // ════════════════════════════════════════════════════════════════════════════
  function renderRoiSelector(args) {
    const frame_b64   = args.frame_b64   || "";
    const frame_w     = args.frame_w     || 960;
    const frame_h     = args.frame_h     || 540;
    const existing    = args.existing_roi || {};

    const plotEl = document.getElementById("plot");
    document.getElementById("no-data").style.display = "none";
    plotEl.style.display = "block";

    plotEl.innerHTML = `
      <div style="position:relative;width:100%;user-select:none;">
        <canvas id="roi-canvas" style="cursor:crosshair;width:100%;display:block;border:1px solid #333;border-radius:4px;"></canvas>
        <div id="roi-hint" style="color:#adaaaa;font-size:11px;margin-top:5px;min-height:16px;"></div>
      </div>`;

    const canvas = document.getElementById("roi-canvas");
    const ctx    = canvas.getContext("2d");
    const img    = new Image();

    let isDragging = false;
    let startX = 0, startY = 0;

    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

    // Map a canvas-CSS coordinate to an image-pixel coordinate
    function toImg(cx, cy) {
      const scaleX = frame_w / canvas.width;
      const scaleY = frame_h / canvas.height;
      return [cx * scaleX, cy * scaleY];
    }

    // Map a canvas-CSS position (relative to canvas element) from a mouse event
    function canvasPos(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width  / rect.width;
      const scaleY = canvas.height / rect.height;
      const src = e.touches ? e.touches[0] : (e.changedTouches ? e.changedTouches[0] : e);
      return [
        (src.clientX - rect.left)  * scaleX,
        (src.clientY - rect.top)   * scaleY,
      ];
    }

    function drawScene(rect) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      if (rect && rect.w >= 2 && rect.h >= 2) {
        ctx.strokeStyle = "#00ff50";
        ctx.lineWidth   = 2;
        ctx.strokeRect(rect.x, rect.y, rect.w, rect.h);
        ctx.fillStyle   = "rgba(0,255,80,0.10)";
        ctx.fillRect(rect.x, rect.y, rect.w, rect.h);
      }
    }

    function sendRoi(x1, y1, x2, y2) {
      let ix1 = clamp(Math.round(Math.min(x1, x2)), 0, frame_w - 1);
      let iy1 = clamp(Math.round(Math.min(y1, y2)), 0, frame_h - 1);
      let iw  = clamp(Math.round(Math.abs(x2 - x1)), 4, frame_w  - ix1);
      let ih  = clamp(Math.round(Math.abs(y2 - y1)), 2, frame_h  - iy1);
      if (iw < 4 || ih < 2) return;
      Streamlit.setValue({ x: ix1, y: iy1, w: iw, h: ih });
      const hint = document.getElementById("roi-hint");
      if (hint) hint.textContent = `ROI: (${ix1}, ${iy1})  ${iw}×${ih}px — draw again to adjust.`;
    }

    img.onload = function () {
      canvas.width  = frame_w;
      canvas.height = frame_h;

      // Show existing ROI (if any) on first render
      let initRect = null;
      if (existing.w > 0 && existing.h > 0) {
        initRect = { x: existing.x, y: existing.y, w: existing.w, h: existing.h };
        const hint = document.getElementById("roi-hint");
        if (hint) hint.textContent = `Current ROI: (${existing.x}, ${existing.y})  ${existing.w}×${existing.h}px`;
      } else {
        const hint = document.getElementById("roi-hint");
        if (hint) hint.textContent = "Click and drag to draw the scoreboard region.";
      }
      drawScene(initRect);

      requestAnimationFrame(() => {
        const h = canvas.getBoundingClientRect().height;
        Streamlit.setHeight(h + 30);
      });
    };

    img.src = "data:image/jpeg;base64," + frame_b64;

    // ── Mouse events ─────────────────────────────────────────────────────────
    canvas.addEventListener("mousedown", function (e) {
      [startX, startY] = canvasPos(e);
      isDragging = true;
      e.preventDefault();
    });

    canvas.addEventListener("mousemove", function (e) {
      if (!isDragging) return;
      const [cx, cy] = canvasPos(e);
      drawScene({ x: Math.min(startX, cx), y: Math.min(startY, cy),
                  w: Math.abs(cx - startX), h: Math.abs(cy - startY) });
    });

    canvas.addEventListener("mouseup", function (e) {
      if (!isDragging) return;
      isDragging = false;
      const [cx, cy] = canvasPos(e);
      const [ix1, iy1] = toImg(startX, startY);
      const [ix2, iy2] = toImg(cx, cy);
      sendRoi(ix1, iy1, ix2, iy2);
    });

    canvas.addEventListener("mouseleave", function () { isDragging = false; });

    // ── Touch events ──────────────────────────────────────────────────────────
    canvas.addEventListener("touchstart", function (e) {
      e.preventDefault();
      [startX, startY] = canvasPos(e);
      isDragging = true;
    }, { passive: false });

    canvas.addEventListener("touchmove", function (e) {
      e.preventDefault();
      if (!isDragging) return;
      const [cx, cy] = canvasPos(e);
      drawScene({ x: Math.min(startX, cx), y: Math.min(startY, cy),
                  w: Math.abs(cx - startX), h: Math.abs(cy - startY) });
    }, { passive: false });

    canvas.addEventListener("touchend", function (e) {
      e.preventDefault();
      if (!isDragging) return;
      isDragging = false;
      const [cx, cy] = canvasPos(e);
      const [ix1, iy1] = toImg(startX, startY);
      const [ix2, iy2] = toImg(cx, cy);
      sendRoi(ix1, iy1, ix2, iy2);
    }, { passive: false });
  }

  // ════════════════════════════════════════════════════════════════════════════
  // Goalkeeper Actions Map
  // ════════════════════════════════════════════════════════════════════════════
  const GK_STYLE = {
    "Punch":         { color: "#3498db", symbol: "circle" },
    "Claim":         { color: "#27ae60", symbol: "square" },
    "KeeperSweeper": { color: "#f39c12", symbol: "diamond" },
    "KeeperPickup":  { color: "#8e44ad", symbol: "triangle-up" },
    "PenaltyFaced":  { color: "#e74c3c", symbol: "pentagon" },
  };

  function renderGoalkeeperMap(args) {
    const isLight    = args.light_mode === true;
    const _pitchBG   = isLight ? LIGHT_PITCH_BG : PITCH_BG;
    const _pitchLine = isLight ? LIGHT_PITCH_LINE : PITCH_LINE;
    const _pitchThick= isLight ? LIGHT_PITCH_THICK : PITCH_THICK;
    const _goalFill  = isLight ? LIGHT_GOAL_FILL : "rgba(255,255,255,0.04)";
    const _markerBorder = isLight ? LIGHT_MARKER_BORDER : DARK_MARKER_BORDER;
