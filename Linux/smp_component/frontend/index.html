    const _legendFont = isLight ? LIGHT_LEGEND_FONT : "#adaaaa";
    const actions    = args.actions     || [];
    const homeTeam   = args.home_team   || "";
    const selectedIdx= args.selected_idx != null ? args.selected_idx : null;
    const height     = args.height      || 520;
    const shotsFaced = args.shots_faced === true;

    document.getElementById("no-data").style.display = actions.length ? "none" : "block";
    document.getElementById("plot").style.display = actions.length ? "block" : "none";
    if (!actions.length) { Streamlit.setHeight(100); return; }

    const plotEl = document.getElementById("plot");
    const shapes = defHalfPitchVertShapes(_pitchLine, _pitchThick, _pitchBG, _goalFill);
    const dimmed = selectedIdx !== null;
    const traces = [];

    if (shotsFaced) {
      // ── Shots Faced mode ────────────────────────────────────────────────────
      // Opposing shots: display_x = y, display_y = x (no inversion — x≈90 lands near own goal)
      // y is mirrored (a.y not 100-a.y) so left/right matches the GK's perspective
      // Group by outcome: Saved (blue) vs Goal (red)
      const groups = [
        { label: "Saved",    color: isLight ? lightModeAccent("#7ab4ff") : "#7ab4ff", acts: actions.filter(a => a.type === "SavedShot") },
        { label: "Goal",     color: isLight ? lightModeAccent("#e74c3c") : "#e74c3c", acts: actions.filter(a => a.type === "Goal")      },
      ];
      groups.forEach(({label, color, acts}) => {
        if (!acts.length) return;
        const [r,g,b] = [parseInt(color.slice(1,3),16),parseInt(color.slice(3,5),16),parseInt(color.slice(5,7),16)];
        traces.push({
          x: acts.map(a => a.y),
          y: acts.map(a => a.x),
          mode: "markers", name: label,
          marker: {
            symbol: label === "Goal" ? "circle" : "circle-open",
            color: acts.map(a => {
              const isSel = selectedIdx === a.df_idx;
              const alpha = dimmed ? (isSel ? 1.0 : 0.18) : 0.94;
              return label === "Goal" ? `rgba(${r},${g},${b},${alpha})` : "rgba(0,0,0,0)";
            }),
            size: acts.map(a => selectedIdx === a.df_idx ? 28 : 19),
            line: {
              color: acts.map(a => {
                const isSel = selectedIdx === a.df_idx;
                const alpha = dimmed ? (isSel ? 1.0 : 0.22) : 0.96;
                return `rgba(${r},${g},${b},${alpha})`;
              }),
              width: acts.map(a => selectedIdx === a.df_idx ? 3.5 : 2.2),
              dash: label === "Goal" ? "solid" : "dot",
            },
          },
          text: acts.map(a => `${a.playerName}<br>${a.minute}'${String(a.second).padStart(2,'0')}"<br>${label}`),
          hovertemplate: "%{text}<extra></extra>",
          customdata: acts.map(a => [a.df_idx, Date.now()]),
          showlegend: true,
        });
      });
    } else {
      // ── GK Actions mode ─────────────────────────────────────────────────────
      const byType = {};
      actions.forEach(a => { if (!byType[a.type]) byType[a.type]=[]; byType[a.type].push(a); });

      Object.entries(byType).forEach(([atype,acts]) => {
        const style = GK_STYLE[atype] || {color:"#aaa",symbol:"circle"};
        const displayColor = isLight ? lightModeAccent(style.color) : style.color;
        // PenaltyFaced has no meaningful coords in WhoScored — always pin to penalty spot
        const isPenalty = atype === "PenaltyFaced";
        traces.push({
          x:acts.map(a=> isPenalty ? 50   : 100-a.y),
          y:acts.map(a=> isPenalty ? 88.5 : 100-a.x),
          mode:"markers", name:atype,
          marker:{
            color:acts.map(a=>{
              const isSel=selectedIdx===a.df_idx;
              const alpha=dimmed?(isSel?1.0:0.18):0.92;
              const [r,g,b]=[parseInt(displayColor.slice(1,3),16),parseInt(displayColor.slice(3,5),16),parseInt(displayColor.slice(5,7),16)];
              return `rgba(${r},${g},${b},${alpha})`;
            }),
          size:acts.map(a=>selectedIdx===a.df_idx?28:19), symbol:style.symbol,
           line:{color:acts.map(a=>(selectedIdx===a.df_idx)?displayColor:_markerBorder),
                width:acts.map(a=>selectedIdx===a.df_idx?3.5:2.2)},
          },
          text:acts.map(a=>`${a.playerName}<br>${a.minute}'${String(a.second).padStart(2,'0')}"<br>${a.type}<br>${a.outcomeType||""}`),
          hovertemplate:"%{text}<extra></extra>",
          customdata:acts.map(a=>[a.df_idx, Date.now()]),
          showlegend:true,
        });
      });
    }

    const layout = {
      paper_bgcolor:"rgba(0,0,0,0)", plot_bgcolor:_pitchBG,
      margin:{l:8,r:8,t:0,b:44}, height:height,
      xaxis:{range:[-5,105],showgrid:false,zeroline:false,showticklabels:false,fixedrange:true},
      yaxis:{range:[105,45],showgrid:false,zeroline:false,showticklabels:false,fixedrange:true,scaleanchor:"x",scaleratio:1},
      shapes:shapes, dragmode:false,
      legend:{orientation:"h",y:-0.04,x:0.5,xanchor:"center",bgcolor:"rgba(0,0,0,0)",font:{size:11,color:_legendFont}},
      showlegend:true,
    };

    cmNewPlot(plotEl, traces, layout, args).then(() => {
      Streamlit.setHeight(plotEl.offsetHeight + 4);
      plotEl.on("plotly_click", function(data) {
        if (!data || !data.points || !data.points.length) return;
        const pt = data.points[0];
        if (pt.customdata) Streamlit.setValue(pt.customdata);
      });
    });
  }


  // ════════════════════════════════════════════════════════════════════════════
  // DRIBBLE & CARRY MAP — horizontal pitch
  // ════════════════════════════════════════════════════════════════════════════
  // Dribble & Carry Map
  // ════════════════════════════════════════════════════════════════════════════
  function renderDribbleCarryMap(args) {
    const isLight    = args.light_mode === true;
    const _pitchBG   = isLight ? LIGHT_PITCH_BG : PITCH_BG;
    const _pitchLine = isLight ? LIGHT_PITCH_LINE : PITCH_LINE;
    const _pitchThick= isLight ? LIGHT_PITCH_THICK : PITCH_THICK;
    const _hudGreen  = isLight ? LIGHT_HUD_GREEN : HUD_GREEN;
    const _markerBorder = isLight ? LIGHT_MARKER_BORDER : DARK_MARKER_BORDER;
    const _carryLineColor = isLight ? LIGHT_CARRY_LINE : "rgba(255,255,255,0.3)";
    const _goalFill  = isLight ? LIGHT_GOAL_FILL : "rgba(255,255,255,0.04)";
    const _legendFont = isLight ? LIGHT_LEGEND_FONT : "#adaaaa";
    const actions    = args.actions     || [];
    const selectedIdx = args.selected_idx != null ? args.selected_idx : null;
    const height      = args.height       || 700;

    document.getElementById("no-data").style.display = actions.length ? "none" : "block";
    document.getElementById("plot").style.display    = actions.length ? "block" : "none";
    if (!actions.length) { Streamlit.setHeight(100); return; }

    const plotEl = document.getElementById("plot");
    const shapes = horizontalPitchShapes(
      _pitchLine, _pitchThick, _pitchBG, _goalFill,
      isLight ? "rgba(30,70,10,0.08)" : undefined,
      isLight ? "rgba(47,93,22,0.055)" : undefined,
      isLight ? "rgba(47,93,22,0.16)" : undefined
    );
    const dimmed = selectedIdx !== null;
    const traces = [];

    const SUCC_COLOR  = isLight ? lightModeAccent("#27ae60") : "#27ae60";
    const FAIL_COLOR  = isLight ? lightModeAccent("#e74c3c") : "#e74c3c";
    const CARRY_COLOR = isLight ? lightModeAccent("#e0c860") : "#e0c860";

    const dribbles = actions.filter(a => a.type === "TakeOn");
    const carries  = actions.filter(a => a.type === "Carry" && a.endX != null && a.endY != null);

    // ── Carry lines (null-separated, not clickable) ──────────────────────────
    if (carries.length) {
      const lineAlpha = dimmed ? (isLight ? 0.32 : 0.18) : (isLight ? 0.82 : 0.68);
      const cxs = [], cys = [];
      carries.forEach(c => {
        cxs.push(c.x, c.endX, null);
        cys.push(100 - c.y, 100 - c.endY, null);
      });
      traces.push({
        x: cxs, y: cys, mode: "lines",
        line: { dash: "dot", width: isLight ? 2.4 : 2, color: rgbaFromHex("#e0c860", lineAlpha, isLight) },
        hoverinfo: "skip", showlegend: false, name: "Carry line",
      });

      // highlighted line for selected carry
      if (dimmed) {
        const sel = carries.find(c => c.df_idx === selectedIdx);
        if (sel) {
          traces.push({
            x: [sel.x, sel.endX],
            y: [100 - sel.y, 100 - sel.endY],
            mode: "lines",
            line: { dash: "dot", width: isLight ? 3.6 : 3, color: rgbaFromHex("#e0c860", 1.0, isLight) },
            hoverinfo: "skip", showlegend: false, name: "",
          });
        }
      }

      // ── Carry endpoints (clickable dots) ────────────────────────────────────
      const ex = [], ey = [], ec = [], es = [], elc = [], elw = [], et = [], ecd = [];
      carries.forEach(c => {
        const isSel  = selectedIdx === c.df_idx;
        const alpha  = dimmed ? (isSel ? 1.0 : 0.18) : 0.92;
        ex.push(c.endX);
        ey.push(100 - c.endY);
        ec.push(rgbaFromHex("#e0c860", alpha, isLight));
        es.push(isSel ? 20 : 13);
        elc.push(isSel ? CARRY_COLOR : _carryLineColor);
        elw.push(isSel ? 2.5 : 1.5);
        et.push(`${c.playerName}<br>${c.minute}'${String(c.second).padStart(2,"0")}"<br>Carry`);
        ecd.push([c.df_idx, Date.now()]);
      });
      traces.push({
        x: ex, y: ey, mode: "markers", name: "Carry",
        marker: { symbol: "circle", color: ec, size: es,
                  line: { color: elc, width: elw } },
        text: et, hovertemplate: "%{text}<extra></extra>",
        customdata: ecd, showlegend: true,
      });
    }

    // ── Dribbles ─────────────────────────────────────────────────────────────
    [
      [dribbles.filter(d => d.outcomeType === "Successful"),   SUCC_COLOR, "Succ. dribbles"],
      [dribbles.filter(d => d.outcomeType !== "Successful"),   FAIL_COLOR, "Unsucc. dribbles"],
    ].forEach(([grp, color, name]) => {
      if (!grp.length) return;
      const [r,g,b] = [parseInt(color.slice(1,3),16), parseInt(color.slice(3,5),16), parseInt(color.slice(5,7),16)];
      traces.push({
        x: grp.map(d => d.x),
        y: grp.map(d => 100 - d.y),
        mode: "markers", name: name,
        marker: {
          symbol: "circle",
          color: grp.map(d => {
            const isSel = selectedIdx === d.df_idx;
            const alpha = dimmed ? (isSel ? 1.0 : 0.18) : 0.94;
            return `rgba(${r},${g},${b},${alpha})`;
          }),
          size: grp.map(d => selectedIdx === d.df_idx ? 24 : 16),
          line: {
            color: grp.map(d => selectedIdx === d.df_idx ? color : _markerBorder),
            width: grp.map(d => selectedIdx === d.df_idx ? 3.5 : 2.2),
          },
        },
        text: grp.map(d => `${d.playerName}<br>${d.minute}'${String(d.second).padStart(2,"0")}"<br>${d.outcomeType === "Successful" ? "Successful dribble" : "Unsuccessful dribble"}`),
        hovertemplate: "%{text}<extra></extra>",
        customdata: grp.map(d => [d.df_idx, Date.now()]),
        showlegend: true,
      });
    });

    const layout = {
      paper_bgcolor: "rgba(0,0,0,0)", plot_bgcolor: _pitchBG,
      margin: {l:5, r:5, t:5, b:5}, height: height,
      xaxis: {range:[-5,105], showgrid:false, zeroline:false, showticklabels:false, fixedrange:true},
      yaxis: {range:[105,-5], showgrid:false, zeroline:false, showticklabels:false, fixedrange:true, scaleanchor:"x", scaleratio:HORIZONTAL_PITCH_SCALERATIO},
      shapes: shapes, annotations:[attackDirectionAnnotation(_hudGreen)], dragmode: false,
      legend: {orientation:"h", y:-0.04, x:0.5, xanchor:"center", bgcolor:"rgba(0,0,0,0)", font:{size:11, color:_legendFont}},
      showlegend: true,
    };

    cmNewPlot(plotEl, traces, layout, args).then(() => {
      Streamlit.setHeight(plotEl.offsetHeight + 4);
      plotEl.on("plotly_click", function(data) {
        if (!data || !data.points || !data.points.length) return;
        const pt = data.points[0];
        if (pt.customdata) Streamlit.setValue(pt.customdata);
      });
    });
  }

  // ════════════════════════════════════════════════════════════════════════════
  // BUILD-UP MAP — horizontal pitch, plots a single sequence's ball path
  // ════════════════════════════════════════════════════════════════════════════
  function renderBuildUpMap(args) {
    const isLight    = args.light_mode === true;
    const _pitchBG   = isLight ? LIGHT_PITCH_BG : PITCH_BG;
    const _pitchLine = isLight ? LIGHT_PITCH_LINE : PITCH_LINE;
    const _pitchThick= isLight ? LIGHT_PITCH_THICK : PITCH_THICK;
    const _hudGreen  = isLight ? LIGHT_HUD_GREEN : HUD_GREEN;
    const _goalFill  = isLight ? LIGHT_GOAL_FILL : "rgba(255,255,255,0.04)";
    const actions     = args.actions      || [];
    const isHome    = args.is_home   || false;
    const height    = args.height    || 260;
    const selectedIdx = args.selected_idx != null ? Number(args.selected_idx) : null;
    const entryMode = args.entry_mode || "";
    const isEntryMap = entryMode === "final_third" || entryMode === "box";
    const teamColor = isLight ? lightModeAccent(isHome ? HOME_HEX : AWAY_HEX) : (isHome ? HOME_HEX : AWAY_HEX);
    const [tr, tg, tb] = isHome ? HOME_RGB : AWAY_RGB;

    const plotEl = document.getElementById("plot");
    document.getElementById("no-data").style.display = "none";
    document.getElementById("plot").style.display    = "block";

    const shapes      = isEntryMap
      ? fullPitchVertShapes(_pitchLine, _pitchThick, _pitchBG, _goalFill)
      : pitchShapes(_pitchLine, _pitchThick, _pitchBG, _goalFill);
    const annotations = [];
    const traces      = [];

    const carryX = [], carryY = [];
    const stepX  = [], stepY  = [], stepText = [], stepHover = [];
    const endX = [], endY = [], endHover = [], endCustom = [], endSize = [], endLine = [], endColor = [];
    const plotPoint = (x, y) => {
      if (isEntryMap) return { x: 100 - y, y: 100 - x };
      return { x: x, y: 100 - y };
    };

    if (entryMode === "final_third") {
      shapes.push({
        type: "rect", x0: 0, y0: 0, x1: 100, y1: 33,
        fillcolor: isLight ? "rgba(47,93,22,0.10)" : "rgba(223,255,0,0.09)",
        line: { color: isLight ? "rgba(47,93,22,0.35)" : "rgba(223,255,0,0.38)", width: 1, dash: "dot" },
        layer: "below",
      });
      annotations.push({
        x: 50, y: 6, xref: "x", yref: "y",
        text: "Final 3rd", showarrow: false,
        font: { color: _hudGreen, size: 11 },
        bgcolor: isLight ? "rgba(255,255,255,0.55)" : "rgba(0,0,0,0.28)",
      });
    } else if (entryMode === "box") {
      shapes.push({
        type: "rect", x0: 21, y0: 0, x1: 79, y1: 17,
        fillcolor: isLight ? "rgba(47,93,22,0.12)" : "rgba(223,255,0,0.11)",
        line: { color: isLight ? "rgba(47,93,22,0.42)" : "rgba(223,255,0,0.48)", width: 1.5, dash: "dot" },
        layer: "below",
      });
      annotations.push({
        x: 50, y: 8, xref: "x", yref: "y",
        text: "Box", showarrow: false,
        font: { color: _hudGreen, size: 11 },
        bgcolor: isLight ? "rgba(255,255,255,0.55)" : "rgba(0,0,0,0.28)",
      });
    }

    actions.forEach(a => {
      if (a.endX == null || a.endY == null) return;
      const startPt = plotPoint(a.x, a.y);
      const endPt = plotPoint(a.endX, a.endY);
      const sx = startPt.x, sy = startPt.y;
      const ex = endPt.x, ey = endPt.y;
      const dfIdx = a.df_idx != null ? Number(a.df_idx) : null;
      const isSelected = selectedIdx != null && dfIdx === selectedIdx;
      const entryKind = a.entry_kind || a.type || "Action";

      stepX.push(sx);
      stepY.push(sy);
      stepText.push(isEntryMap ? "" : String(a.step));
      stepHover.push(
        `${a.step}. ${a.playerName}<br>${a.minute}'${String(a.second).padStart(2,"0")}" (${a.type})`
      );
      if (dfIdx != null) {
        endX.push(ex);
        endY.push(ey);
        endCustom.push(dfIdx);
        endSize.push(isSelected ? 18 : 12);
        endLine.push(isSelected ? 3 : 1.5);
        endColor.push(entryKind === "Carry" ? rgbaFromHex(isHome ? HOME_HEX : AWAY_HEX, isLight ? 0.90 : 0.78, isLight) : teamColor);
        endHover.push(
          `<b>${a.entry_label || "Entry"}</b><br>${a.playerName}<br>` +
          `${a.minute}'${String(a.second).padStart(2,"0")}" (${entryKind})`
        );
      }

      if (a.type === "Pass" || a.type === "SuccessfulFinalThirdPass") {
        annotations.push({
          x: ex, y: ey, ax: sx, ay: sy,
          xref: "x", yref: "y", axref: "x", ayref: "y",
          showarrow: true,
          arrowhead: 2, arrowsize: 1.2, arrowwidth: 2,
          arrowcolor: teamColor,
          text: "",
        });
      } else {
        // Carry — dashed line
        carryX.push(sx, ex, null);
        carryY.push(sy, ey, null);
      }
    });

    // Carry lines
    if (carryX.length) {
      traces.push({
        x: carryX, y: carryY, mode: "lines",
        line: { dash: "dot", width: isLight ? 3 : 2.5, color: rgbaFromHex(isHome ? HOME_HEX : AWAY_HEX, isLight ? 0.88 : 0.70, isLight) },
        hoverinfo: "skip", showlegend: false,
      });
    }

    // Terminal end-point dot (last action's end position)
    if (!isEntryMap && actions.length > 0) {
      const last = actions[actions.length - 1];
      if (last.endX != null && last.endY != null) {
        const lastPt = plotPoint(last.endX, last.endY);
        traces.push({
          x: [lastPt.x], y: [lastPt.y], mode: "markers",
          marker: { symbol: "circle", size: 10,
                    color: rgbaFromHex(isHome ? HOME_HEX : AWAY_HEX, 0.9, isLight),
                    line: { color: teamColor, width: 1.5 } },
          hoverinfo: "skip", showlegend: false,
        });
      }
    }

    if (endX.length) {
      traces.push({
        x: endX, y: endY, mode: "markers",
        marker: {
          symbol: "circle",
          size: endSize,
          color: endColor,
          line: { color: isLight ? "#222222" : "#ffffff", width: endLine },
          opacity: 0.96,
        },
        hovertext: endHover,
        hovertemplate: "%{hovertext}<extra></extra>",
        customdata: endCustom,
        showlegend: false,
      });
    }

    // Numbered start markers (drawn last so they sit on top)
    if (stepX.length) {
      traces.push({
        x: stepX, y: stepY, mode: isEntryMap ? "markers" : "markers+text",
        text: stepText,
        textposition: "middle center",
        textfont: { size: 9, color: "#ffffff", bgcolor: "rgba(0,0,0,0)", family: "Iosevka Charon Mono, monospace" },
        marker: {
          symbol: "circle", size: isEntryMap ? 7 : 20,
          color: isEntryMap ? rgbaFromHex(isHome ? HOME_HEX : AWAY_HEX, isLight ? 0.42 : 0.28, isLight) : rgbaFromHex(isHome ? HOME_HEX : AWAY_HEX, 0.9, isLight),
          line: { color: teamColor, width: isEntryMap ? 0.7 : 1.5 },
        },
        hovertext: stepHover,
        hovertemplate: "%{hovertext}<extra></extra>",
        showlegend: false,
      });
    }

    // Empty state
    if (!actions.length) {
      annotations.push({
        x: 50, y: 50, xref: "x", yref: "y",
        text: "Select a sequence",
        showarrow: false,
        font: { color: "#555555", size: 13 },
      });
    }

    const layout = {
      paper_bgcolor: "rgba(0,0,0,0)", plot_bgcolor: _pitchBG,
      xaxis: { range: [-5, 105], showgrid: false, zeroline: false, showticklabels: false, fixedrange: true },
      yaxis: {
        range: [105, -5],
        showgrid: false,
        zeroline: false,
        showticklabels: false,
        fixedrange: true,
        scaleanchor: "x",
        scaleratio: isEntryMap ? 1.54 : HORIZONTAL_PITCH_SCALERATIO,
      },
      shapes: shapes, annotations: annotations,
      dragmode: false, showlegend: false,
      height: height,
      margin: { l: 8, r: 8, t: 8, b: 8 },
    };

    cmNewPlot(plotEl, traces, layout, args).then(() => {
      Streamlit.setHeight(plotEl.offsetHeight + 4);
      plotEl.removeAllListeners("plotly_click");
      plotEl.on("plotly_click", function(data) {
        if (!data || !data.points || !data.points.length) return;
        const pt = data.points[0];
        if (pt.customdata != null) {
          Streamlit.setValue([pt.customdata, Date.now()]);
        }
      });
    });
  }

  // ════════════════════════════════════════════════════════════════════════════
  // PENALTY SHOOTOUT MAP
  // Layout: goalframe top-centre, home player circles left, away player circles right
  // Clicking a player circle sends back [df_idx, timestamp]
  // ════════════════════════════════════════════════════════════════════════════
  function renderPenaltyShootout(args) {
    const isLight    = args.light_mode === true;
    const shots      = args.shots      || [];
    const homeTeam   = args.home_team  || "Home";
    const awayTeam   = args.away_team  || "Away";
    const selectedIdx= args.selected_idx != null ? args.selected_idx : null;
    const height     = args.height     || 560;
    const _annoColor = isLight ? LIGHT_ANNO_COLOR : "#adaaaa";
    const _penaltySpot = isLight ? LIGHT_PENALTY : "rgba(255,255,255,0.5)";

    const plotEl = document.getElementById("plot");
    document.getElementById("no-data").style.display = shots.length ? "none" : "block";
    plotEl.style.display = shots.length ? "block" : "none";
    if (!shots.length) { Streamlit.setHeight(100); return; }

    const homeShots = sortShotsChronologically(shots.filter(s => s.is_home));
    const awayShots = sortShotsChronologically(shots.filter(s => !s.is_home));
    const ROW_SIZE = 5;
    const homeRows = Math.max(1, Math.ceil(homeShots.length / ROW_SIZE));
    const awayRows = Math.max(1, Math.ceil(awayShots.length / ROW_SIZE));
    const playerRows = Math.max(homeRows, awayRows);
    const playerRangeForRows = rows => [-(rows - 1) - 0.8, 0.8];
    const layoutHeight = Math.max(height, 760 + Math.max(0, playerRows - 1) * 72);

    // Compute goalframe data for selected shot
    const selShot = selectedIdx != null ? shots.find(s => s.df_idx === selectedIdx) : null;
    const hasGF   = selShot && selShot.goal_mouth_y != null && selShot.goal_mouth_z != null;

    // ── Helper: build player circle trace for one team ──────────────────────
    // ── Helper: build player traces for one team (split by outcome for correct rendering)
    function buildPlayerTraces(teamShots, isHome, xaxis, yaxis) {
      const baseColor = isHome ? HOME_HEX : AWAY_HEX;
      const [r,g,b]   = isHome ? HOME_RGB  : AWAY_RGB;
      const goals = [], saved = [], missed = [];

      teamShots.forEach((s, i) => {
        const col  = i % ROW_SIZE;
        const row  = Math.floor(i / ROW_SIZE);
        const isSel = s.df_idx === selectedIdx;
        const sec   = String(s.second).padStart(2, "0");
        const entry = {
          x: col, y: -row, dfIdx: s.df_idx, size: isSel ? 30 : 22,
          text: "<b>" + (s.playerName || "") + "</b><br>" + s.minute + "'" + sec + '"<br>' + s.type,
        };
        if      (s.type === "Goal")   goals.push(entry);
        else if (MISSED.has(s.type))  missed.push(entry);
        else                          saved.push(entry);
      });

      function mkTrace(bucket, symbol, fillColor, borderColor, lineWidth) {
        if (!bucket.length) return null;
        return {
          x: bucket.map(e => e.x), y: bucket.map(e => e.y),
          mode: "markers", type: "scatter", xaxis, yaxis,
          text: bucket.map(e => e.text),
          hovertemplate: "%{text}<extra></extra>",
          customdata: bucket.map(e => e.dfIdx),
          marker: {
            size:   bucket.map(e => e.size),
            symbol, color: fillColor,
            line:   { color: borderColor, width: lineWidth },
          },
          showlegend: false,
        };
      }

      return [
        mkTrace(goals,  "circle",      "rgba(" + r + "," + g + "," + b + ",0.85)", baseColor, 2),
        mkTrace(saved,  "circle-open", baseColor,                                    baseColor, 3),
        mkTrace(missed, "circle-open", baseColor,                                    baseColor, 3),
      ].filter(Boolean);
    }

    // ── Goal frame traces ────────────────────────────────────────────────────
    const shootoutExpandedRange = expandedGoalframeRangeForShot(
      hasGF ? { _px: 100 - selShot.goal_mouth_y, _py: selShot.goal_mouth_z } : null,
      SHOOTOUT_GOALFRAME_X_RANGE,
      SHOOTOUT_GOALFRAME_Y_RANGE,
      SHOOTOUT_GOALFRAME_EXPAND_MARGIN_X,
      SHOOTOUT_GOALFRAME_EXPAND_MARGIN_Y
    );

    const gfShapes = goalframeShapes(shootoutExpandedRange.xRange, shootoutExpandedRange.yRange).map(s => {
      const ns = Object.assign({}, s);
      ns.xref = "x2"; ns.yref = "y2";
      if (ns.line) ns.line = Object.assign({}, ns.line);
      return ns;
    });

    // Shot dot on goalframe
    const gfTraces = [];
    if (hasGF) {
      const gx = 100 - selShot.goal_mouth_y;
      const gy = selShot.goal_mouth_z;
      const isHome = selShot.is_home;
      const [r,g,b] = isHome ? HOME_RGB : AWAY_RGB;
      const isGoal  = selShot.type === "Goal";
      const isMiss  = MISSED.has(selShot.type);
      gfTraces.push({
        x: [gx], y: [gy], mode: "markers", type: "scatter",
        xaxis: "x2", yaxis: "y2",
        marker: {
          size: 18,
          color: isGoal ? `rgba(${r},${g},${b},0.85)` : (isHome ? HOME_HEX : AWAY_HEX),
          symbol: isGoal ? "circle" : "circle-open",
          line: { color: isHome ? HOME_HEX : AWAY_HEX, width: 3 },
        },
        hoverinfo: "none", showlegend: false,
      });
    }

    // ── Penalty spot marker (goalframe) ──────────────────────────────────────
    gfTraces.push({
      x: [50], y: [-5.2], mode: "markers", type: "scatter",
      xaxis: "x2", yaxis: "y2",
      marker: { size: 10, color: "rgba(0,0,0,0)", symbol: "circle-open",
                line: { color: _penaltySpot, width: 2 } },
      hoverinfo: "none", showlegend: false,
    });

    const homeTraces = buildPlayerTraces(homeShots, true,  "x",  "y");
    const awayTraces = buildPlayerTraces(awayShots, false, "x3", "y3");

    // ── Annotations ─────────────────────────────────────────────────────────
    const annotations = [
      { text: "GOALFRAME",           x: 0.50, y: 1.03, xref: "paper", yref: "paper", showarrow: false, font: { size: 12, color: _annoColor } },
      { text: `<b>${homeTeam}</b>`,  x: 0.25, y: 0.28, xref: "paper", yref: "paper", showarrow: false, font: { size: 12, color: HOME_HEX } },
      { text: `<b>${awayTeam}</b>`,  x: 0.75, y: 0.28, xref: "paper", yref: "paper", showarrow: false, font: { size: 12, color: AWAY_HEX } },
      { text: "Penalty spot",        x: 50,   y: -7.1, xref: "x2",    yref: "y2",    showarrow: false, font: { size: 9, color: _annoColor } },
    ];

    // Goalframe post / crossbar annotations
    const gMid = (GOAL_Y_LEFT + GOAL_Y_RIGHT) / 2;
    [{x: GOAL_Y_LEFT, t: "Post"}, {x: GOAL_Y_RIGHT, t: "Post"}].forEach(p => {
      annotations.push({ x: p.x, y: -7.1, xref: "x2", yref: "y2", text: p.t, showarrow: false, font: { size: 9, color: _annoColor } });
    });
    annotations.push({ x: gMid, y: GOAL_Z_TOP + 1, xref: "x2", yref: "y2", text: "Bar", showarrow: false, font: { size: 9, color: _annoColor } });

    const layout = {
      paper_bgcolor: "rgba(0,0,0,0)", plot_bgcolor: "rgba(0,0,0,0)",
      margin: { l: 10, r: 10, t: 30, b: 20 }, height: layoutHeight,
      dragmode: false, showlegend: false,
      annotations: annotations,

      // x/y — home player circles (bottom left)
      xaxis:  { domain: [0.05, 0.47], range: [-0.7, 4.7], showgrid: false, zeroline: false, showticklabels: false, fixedrange: true, anchor: "y" },
      yaxis:  { domain: [0.02, 0.23], range: playerRangeForRows(homeRows), showgrid: false, zeroline: false, showticklabels: false, fixedrange: true, scaleanchor: "x", scaleratio: 1, anchor: "x" },

      // x2/y2 — goalframe (top, full column width)
      xaxis2: { domain: [0.03, 0.97], range: shootoutExpandedRange.xRange, showgrid: false, zeroline: false, showticklabels: false, fixedrange: true, anchor: "y2" },
      yaxis2: { domain: [0.34, 0.98], range: shootoutExpandedRange.yRange, showgrid: false, zeroline: false, showticklabels: false, fixedrange: true, anchor: "x2", scaleanchor: "x2", scaleratio: GOAL_SCALERATIO },

      // x3/y3 — away player circles (bottom right)
      xaxis3: { domain: [0.53, 0.95], range: [-0.7, 4.7], showgrid: false, zeroline: false, showticklabels: false, fixedrange: true, anchor: "y3" },
      yaxis3: { domain: [0.02, 0.23], range: playerRangeForRows(awayRows), showgrid: false, zeroline: false, showticklabels: false, fixedrange: true, scaleanchor: "x3", scaleratio: 1, anchor: "x3" },

      shapes: [
        { type: "rect", x0: shootoutExpandedRange.xRange[0], y0: shootoutExpandedRange.yRange[0], x1: shootoutExpandedRange.xRange[1], y1: shootoutExpandedRange.yRange[1], fillcolor: PITCH_BG, line: { color: "rgba(0,0,0,0)" }, layer: "below", xref: "x2", yref: "y2" },
        ...gfShapes,
      ],
    };

    const allTraces = [...homeTraces, ...awayTraces, ...gfTraces];

    cmNewPlot(plotEl, allTraces, layout, args).then(() => {
      Streamlit.setHeight(plotEl.offsetHeight + 4);
      plotEl.removeAllListeners("plotly_click");
      plotEl.on("plotly_click", function(data) {
        if (!data || !data.points || !data.points.length) return;
        const pt = data.points[0];
        // Only player circle traces carry customdata as a plain df_idx integer
        if (pt.customdata != null && typeof pt.customdata !== "object") {
          Streamlit.setValue([pt.customdata, Date.now()]);
        }
      });
    });
  }

  function renderTimelineWindow(args) {
    const isLight = args.light_mode === true;
    const _shadowColor = isLight ? LIGHT_SHADOW : "rgba(255,255,255,0.45)";
    const _labelColor = isLight ? "#555555" : "#d9d9d9";
    const _captionColor = isLight ? "#555555" : "#8e8e8e";
    const currentWindow = Math.max(1, Number(args.current_window_seconds || 0));
    const beforeLimit = Math.max(0, Number(args.before_limit_seconds || 180));
    const afterLimit = Math.max(0, Number(args.after_limit_seconds || 180));
    const total = Math.max(1, beforeLimit + currentWindow + afterLimit);
    const plotEl = document.getElementById("plot");
    document.getElementById("no-data").style.display = "none";
    plotEl.style.display = "block";

    const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
    const toMMSS = (secs) => {
      const totalSecs = Math.max(0, Math.round(secs));
      const minutes = Math.floor(totalSecs / 60);
      const seconds = totalSecs % 60;
      return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
    };
    const toPct = (secs) => (secs / total) * 100;
    const currentStartPct = toPct(beforeLimit);
    const currentEndPct = toPct(beforeLimit + currentWindow);
    const currentWidthPct = currentEndPct - currentStartPct;

    const initialBefore = clamp(Number(args.selected_before_seconds || 0), 0, beforeLimit);
    const initialAfter = clamp(Number(args.selected_after_seconds || 0), 0, afterLimit);

    plotEl.innerHTML = `
      <div style="padding:8px 0 4px 0;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;color:${_captionColor};font-size:11px;letter-spacing:0.12em;text-transform:uppercase;">
          <span>${toMMSS(beforeLimit)} before</span>
          <span>&nbsp;</span>
          <span>${toMMSS(afterLimit)} after</span>
        </div>
        <div id="cm-timeline-wrap" style="position:relative;height:54px;padding:14px 0 10px 0;">
          <div style="position:absolute;left:0;right:0;top:24px;height:6px;border-radius:999px;background:linear-gradient(90deg, rgba(120,120,120,0.25), rgba(170,170,170,0.18));"></div>
          <div id="cm-before-fill" style="position:absolute;top:24px;height:6px;border-radius:999px;background:${args.light_mode === true ? 'linear-gradient(90deg, rgba(47,93,22,0.25), rgba(47,93,22,0.75))' : 'linear-gradient(90deg, rgba(223,255,0,0.25), rgba(223,255,0,0.75))'};"></div>
          <div id="cm-after-fill" style="position:absolute;top:24px;height:6px;border-radius:999px;background:${args.light_mode === true ? 'linear-gradient(90deg, rgba(47,93,22,0.75), rgba(47,93,22,0.25))' : 'linear-gradient(90deg, rgba(223,255,0,0.75), rgba(223,255,0,0.25))'};"></div>
          <div id="cm-current-window" style="position:absolute;top:14px;height:26px;border-radius:999px;background:#f4f1e8;color:#111;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;box-shadow:0 0 0 1px ${_shadowColor}, 0 10px 26px rgba(0,0,0,0.28);padding:0 10px;white-space:nowrap;pointer-events:none;"></div>
          <button id="cm-left-handle" type="button" style="position:absolute;top:12px;width:28px;height:28px;border-radius:999px;border:2px solid ${args.light_mode === true ? '#2f5d16' : '#dfff00'};background:${args.light_mode === true ? '#fcf8f2' : '#161616'};box-shadow:0 0 0 3px ${args.light_mode === true ? 'rgba(47,93,22,0.15)' : 'rgba(223,255,0,0.15)'};cursor:ew-resize;"></button>
          <button id="cm-right-handle" type="button" style="position:absolute;top:12px;width:28px;height:28px;border-radius:999px;border:2px solid ${args.light_mode === true ? '#2f5d16' : '#dfff00'};background:${args.light_mode === true ? '#fcf8f2' : '#161616'};box-shadow:0 0 0 3px ${args.light_mode === true ? 'rgba(47,93,22,0.15)' : 'rgba(223,255,0,0.15)'};cursor:ew-resize;"></button>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;color:${_labelColor};font-size:12px;">
          <span id="cm-before-label">Before ${toMMSS(initialBefore)}</span>
          <span id="cm-after-label">After ${toMMSS(initialAfter)}</span>
        </div>
      </div>`;

    const wrap = document.getElementById("cm-timeline-wrap");
    const currentEl = document.getElementById("cm-current-window");
    const beforeFill = document.getElementById("cm-before-fill");
    const afterFill = document.getElementById("cm-after-fill");
    const leftHandle = document.getElementById("cm-left-handle");
    const rightHandle = document.getElementById("cm-right-handle");
    const beforeLabel = document.getElementById("cm-before-label");
    const afterLabel = document.getElementById("cm-after-label");

    if (window.__cmTimelineCleanup) {
      window.__cmTimelineCleanup();
      window.__cmTimelineCleanup = null;
    }

    const state = { before: initialBefore, after: initialAfter };
    let dragging = null;
    let dragStartClientX = 0;
    let dragOriginBefore = initialBefore;
    let dragOriginAfter = initialAfter;

    function emitValue() {
      Streamlit.setValue({
        before_seconds: Math.round(state.before),
        after_seconds: Math.round(state.after),
        nonce: Date.now(),
      });
    }

    function draw() {
      const leftPct = toPct(beforeLimit - state.before);
      const rightPct = toPct(beforeLimit + currentWindow + state.after);
      const currentLeft = currentStartPct;
      const currentRight = currentLeft + currentWidthPct;

      currentEl.style.left = `${currentLeft}%`;
      currentEl.style.width = `${Math.min(100 - currentLeft, currentWidthPct)}%`;

      leftHandle.style.left = `calc(${leftPct}% - 14px)`;
      rightHandle.style.left = `calc(${rightPct}% - 14px)`;

      beforeFill.style.left = `${leftPct}%`;
      beforeFill.style.width = `${Math.max(0, currentStartPct - leftPct)}%`;
      afterFill.style.left = `${currentEndPct}%`;
      afterFill.style.width = `${Math.max(0, rightPct - currentEndPct)}%`;

      beforeLabel.textContent = `Before ${toMMSS(state.before)}`;
      afterLabel.textContent = `After ${toMMSS(state.after)}`;
    }

    function onMove(clientX) {
      const rect = wrap.getBoundingClientRect();
      const deltaPct = ((clientX - dragStartClientX) / Math.max(rect.width, 1)) * 100;
      const deltaSeconds = (deltaPct / 100) * total;
      if (dragging === "left") {
        state.before = clamp(dragOriginBefore - deltaSeconds, 0, beforeLimit);
      } else if (dragging === "right") {
        state.after = clamp(dragOriginAfter + deltaSeconds, 0, afterLimit);
      }
      draw();
    }

    function startDrag(which, event) {
      dragging = which;
      const src = event.touches ? event.touches[0] : event;
      dragStartClientX = src.clientX;
      dragOriginBefore = state.before;
      dragOriginAfter = state.after;
      event.preventDefault();
    }

    function stopDrag() {
      if (!dragging) return;
      dragging = null;
      emitValue();
    }

    const onMouseMove = (e) => { if (dragging) onMove(e.clientX); };
    const onMouseUp = () => stopDrag();
    const onLeftMouseDown = (e) => startDrag("left", e);
    const onRightMouseDown = (e) => startDrag("right", e);
    const onLeftTouchStart = (e) => startDrag("left", e);
    const onRightTouchStart = (e) => startDrag("right", e);
    const onTouchMove = (e) => {
      if (!dragging || !e.touches || !e.touches.length) return;
      onMove(e.touches[0].clientX);
      e.preventDefault();
    };
    const onTouchEnd = () => stopDrag();

    leftHandle.addEventListener("mousedown", onLeftMouseDown);
    rightHandle.addEventListener("mousedown", onRightMouseDown);
    window.addEventListener("mousemove", onMouseMove);
    window.addEventListener("mouseup", onMouseUp);

    leftHandle.addEventListener("touchstart", onLeftTouchStart, { passive: false });
    rightHandle.addEventListener("touchstart", onRightTouchStart, { passive: false });
    window.addEventListener("touchmove", onTouchMove, { passive: false });
    window.addEventListener("touchend", onTouchEnd);

    window.__cmTimelineCleanup = function() {
      leftHandle.removeEventListener("mousedown", onLeftMouseDown);
      rightHandle.removeEventListener("mousedown", onRightMouseDown);
      window.removeEventListener("mousemove", onMouseMove);
      window.removeEventListener("mouseup", onMouseUp);
      leftHandle.removeEventListener("touchstart", onLeftTouchStart);
      rightHandle.removeEventListener("touchstart", onRightTouchStart);
      window.removeEventListener("touchmove", onTouchMove);
      window.removeEventListener("touchend", onTouchEnd);
    };

    draw();
    Streamlit.setHeight(150);
  }

  // ════════════════════════════════════════════════════════════════════════════
  // Router
  // ════════════════════════════════════════════════════════════════════════════
  function render(args) {
    document.body.classList.toggle("cm-light", args.light_mode === true);
    _exportBrandColor = args.light_mode === true ? "#2f5d16" : "#DFFF00";
    const t = args.component_type || "";
    if (t === "penalty_shootout")       renderPenaltyShootout(args);
    else if (t === "echarts_option")    renderEchartsOption(args);
    else if (t === "shot_map")         renderShotMap(args);
    else if (t === "pass_map")         renderPassMap(args);
    else if (t === "defensive_map")    renderDefensiveMap(args);
    else if (t === "dribble_carry_map") renderDribbleCarryMap(args);
    else if (t === "goalkeeper_map")   renderGoalkeeperMap(args);
    else if (t === "build_up_map")     renderBuildUpMap(args);
    else if (t === "roi_selector")     renderRoiSelector(args);
    else if (t === "timeline_window")  renderTimelineWindow(args);
    else {
      if (args.shots !== undefined)   renderShotMap(args);
      else if (args.passes !== undefined) renderPassMap(args);
      else if (args.actions !== undefined) renderDefensiveMap(args);
      else Streamlit.setHeight(100);
    }
  }

  // ════════════════════════════════════════════════════════════════════════════
  // Boot — listen for Streamlit render messages
  // ════════════════════════════════════════════════════════════════════════════
  window.addEventListener("message", function(event) {
    var msg = event.data;
    if (!msg || typeof msg !== "object") return;
    if (msg.type === "streamlit:render") {
      render(msg.args);
    }
  });
  Streamlit.ready();
  </script>
</body>
</html>
